/* ── TMDB API ── */
async function tmdbSearch(title,type){
  const q=title.replace(/\s*\(.*?\)/g,'').replace(/:\s*(season|s)\s*\d+/i,'').trim();
  try{
    const r=await fetch(
      `https://api.themoviedb.org/3/search/${type==='movie'?'movie':'tv'}?query=${encodeURIComponent(q)}&language=en-US&page=1`,
      {headers:{'Authorization':`Bearer ${TOKEN}`}}
    );
    if(!r.ok)return[];
    const d=await r.json();
    return(d.results||[]).slice(0,6).map(x=>({
      tmdbId:x.id,title:x.title||x.name||'',
      year:(x.release_date||x.first_air_date||'').slice(0,4),
      date:x.release_date||x.first_air_date||'',
      poster:x.poster_path?`${IMG}${x.poster_path}`:null,
      description:x.overview||'',
    }));
  }catch{return[];}
}

async function getProviders(tmdbId,type){
  try{
    const r=await fetch(
      `https://api.themoviedb.org/3/${type==='movie'?'movie':'tv'}/${tmdbId}/watch/providers`,
      {headers:{'Authorization':`Bearer ${TOKEN}`}}
    );
    if(!r.ok)return[];
    const d=await r.json();
    const us=d.results?.US;
    if(!us)return[];
    const all=[...(us.flatrate||[]),...(us.free||[])];
    return[...new Set(all.map(p=>PMAP[p.provider_name]).filter(Boolean))];
  }catch{return[];}
}

async function fetchTVDetails(tmdbId){
  try{
    const r=await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}`,{headers:{'Authorization':`Bearer ${TOKEN}`}});
    if(!r.ok)return null;
    const d=await r.json();
    const next=d.next_episode_to_air;
    const last=d.last_episode_to_air;
    // Only flag as "new upcoming season" if next ep is a genuinely new season
    const isNewSeason=next&&last&&next.season_number>last.season_number;
    return{
      currentSeason:last?{date:last.air_date,season:last.season_number}:null,
      upcomingSeason:isNewSeason?{date:next.air_date,season:next.season_number}:null,
      totalSeasons:d.number_of_seasons||1,
      firstAirDate:d.first_air_date||'',
    };
  }catch{return null;}
}

// Apply TV detail updates to an item based on its category
function applyTVDets(item,dets,overrideStreaming){
  if(!dets)return{tvDetailsFetched:true};
  const{currentSeason:cur,upcomingSeason:upc,totalSeasons,firstAirDate}=dets;
  const sk=item.tmdbId?showKey(item.tmdbId):null;
  if(item.category==='rewatch'){
    const startYear=firstAirDate?.slice(0,4)||'';
    const endYear=cur?.date?.slice(0,4)||startYear;
    return{
      tvDetailsFetched:true,showKey:sk,
      ...(cur?{tmdbDate:cur.date}:{}),
      seasonNote:totalSeasons>1?`Season 1–${totalSeasons}`:`Season ${totalSeasons}`,
      yearRange:startYear&&endYear&&startYear!==endYear?`${startYear}–${endYear}`:startYear,
    };
  }
  if(item.category==='comingSoon'){
    const ep=upc||cur;
    return{
      tvDetailsFetched:true,showKey:sk,
      ...(ep?{tmdbDate:ep.date,seasonNote:`Season ${ep.season}`}:{}),
      _companionCat:'released',_companionEp:cur,
    };
  }
  // released
  return{
    tvDetailsFetched:true,showKey:sk,
    ...(cur?{tmdbDate:cur.date,seasonNote:`Season ${cur.season}`}:{}),
    _companionCat:'comingSoon',_companionEp:upc,
  };
}

async function fetchItem(item){
  const results=await tmdbSearch(item.title,item.type);
  // For comingSoon prefer a result with a future release date
  let r=null;
  if(item.category==='comingSoon'&&results.length>1){
    r=results.find(x=>x.date&&x.date>=TODAY())||results[0];
  }else{
    r=results[0]||null;
  }
  if(!r)return{tmdbFetched:true,tvDetailsFetched:item.type==='tv'};
  const update={poster:r.poster,description:r.description,tmdbDate:r.date,tmdbId:r.tmdbId,tmdbFetched:true};
  // Auto-fetch streaming only when user hasn't specified any
  if(!item.streaming||!item.streaming.length){
    const pvs=await getProviders(r.tmdbId,item.type);
    if(pvs.length)update.streaming=pvs;
  }
  if(item.type==='tv'){
    const dets=await fetchTVDetails(r.tmdbId);
    const tvUpd=applyTVDets({...item,...update},dets);
    Object.assign(update,tvUpd);
  }
  return update;
}

async function runQ(tasks,limit){
  if(!tasks.length)return;
  return new Promise(res=>{
    const q=[...tasks];let active=0;
    function next(){
      while(active<limit&&q.length){
        const t=q.shift();active++;
        Promise.resolve(t()).finally(()=>{active--;next();if(!active&&!q.length)res();});
      }
      if(!active&&!q.length)res();
    }
    next();
  });
}

/* ── DATE UTILS ── */
function parseDate(s){
  if(!s)return null;
  s=s.trim();
  if(!s||s==='TBD'||s==='?')return null;
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return new Date(s+'T00:00:00');
  const a=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
  if(a)return new Date(2000+~~a[3],~~a[1]-1,~~a[2]);
  const b=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(b)return new Date(~~b[3],~~b[1]-1,~~b[2]);
  const c=s.match(/^([A-Za-z]+)\s+(\d{4})$/);
  if(c){const M={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    const m=M[c[1].toLowerCase().slice(0,3)];if(m!=null)return new Date(~~c[2],m,1);}
  return null;
}

function autoMove(items){
  const now=Date.now(),DAYS=45;
  return items.map(i=>{
    if(i.category!=='comingSoon')return i;
    const d=parseDate(i.tmdbDate)||parseDate(i.userDate);
    if(!d||d.getTime()>now)return i;
    return{...i,category:'released',inTheaters:(now-d.getTime())/86400000<=DAYS};
  });
}

function formatDate(item){
  if(item.yearRange)return item.yearRange;
  const d=parseDate(item.tmdbDate)||parseDate(item.userDate);
  if(!d){
    if(item.userDate&&/^\d{4}$/.test(item.userDate.trim()))return item.userDate.trim();
    return'';
  }
  if(item.category==='comingSoon'||item.inTheaters)
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  return String(d.getFullYear());
}

function sortedItems(arr,sec){
  const ms=i=>{const d=parseDate(i.tmdbDate)||parseDate(i.userDate);return d?d.getTime():null;};
  return[...arr].sort((a,b)=>{
    const da=ms(a),db=ms(b);
    if(da==null&&db==null)return 0;
    if(da==null)return 1;if(db==null)return-1;
    return sec==='comingSoon'?da-db:db-da;
  });
}

// Creates a companion card when a TV show has both a current and upcoming season
function makeCompanion(base,cat,ep){
  return{
    ...base,id:uid(),category:cat,
    tmdbDate:ep.date,seasonNote:`Season ${ep.season}`,
    autoCreated:true,inTheaters:false,userDate:'',
    // Coming soon companions don't have streaming yet
    ...(cat==='comingSoon'?{streaming:[]}:{}),
  };
}

  return<span className="badge" style={{background:s.bg,color:s.fg}}>{svc}{note?` ${note}`:''}</span>;
}

        {item.seasonNote&&<div className="cseason">{item.seasonNote}</div>}

}

function AddModal({onClose,onAdd}){
  const[q,setQ]=useState('');
  const[mtype,setMtype]=useState('movie');
  const[intent,setIntent]=useState('watch');
  const[results,setResults]=useState([]);
  const[sel,setSel]=useState(null);
  const[loading,setLoading]=useState(false);
  const[adding,setAdding]=useState(false);
  const[svc,setSvc]=useState('');
  const[sNote,setSNote]=useState('');
  // TV season state
  const[tvDets,setTvDets]=useState(null);
  const[tvFetching,setTvFetching]=useState(false);
  const[manualSeason,setManualSeason]=useState(1);
  const[trackUpcoming,setTrackUpcoming]=useState(false);
  const[upcomingSeasNum,setUpcomingSeasNum]=useState('');
  const[upcomingYr,setUpcomingYr]=useState('');
  const ref=useRef(null);
  useEffect(()=>{ref.current?.focus();},[]);

  const resetTV=()=>{setTvDets(null);setTvFetching(false);setManualSeason(1);setTrackUpcoming(false);setUpcomingSeasNum('');setUpcomingYr('');};

  const selectResult=async r=>{
    setSel(r);
    if(mtype==='tv'&&intent==='watch'&&r.tmdbId){
      setTvFetching(true);setTvDets(null);
      const dets=await fetchTVDetails(r.tmdbId);
      setTvDets(dets);
      if(dets){
        const cur=dets.currentSeason?.season||1;
        setManualSeason(cur);
        if(dets.upcomingSeason){
          setTrackUpcoming(true);
          setUpcomingSeasNum(String(dets.upcomingSeason.season));
          setUpcomingYr(dets.upcomingSeason.date?.slice(0,4)||'');
        }else{
          setTrackUpcoming(false);
          setUpcomingSeasNum(String(cur+1));
          setUpcomingYr('');
        }
      }
      setTvFetching(false);
    }
  };

  const doSearch=async()=>{
    if(!q.trim())return;
    setLoading(true);setSel(null);resetTV();
    const r=await tmdbSearch(q,mtype);
    const sorted=intent==='watch'&&mtype==='movie'
      ?[...r].sort((a,b)=>{
          const af=a.date&&a.date>=TODAY()?1:0;
          const bf=b.date&&b.date>=TODAY()?1:0;
          return bf-af;
        })
      :r;
    setResults(sorted);setLoading(false);
  };

  const handleAdd=async()=>{
    if(!sel&&!q.trim())return;
    setAdding(true);
    const isRewatch=intent==='rewatch';
    const title=sel?sel.title:q.trim();

    let streaming=svc?[svc]:[];
    if(!streaming.length&&sel?.tmdbId){
      const pvs=await getProviders(sel.tmdbId,mtype);
      if(pvs.length)streaming=pvs;
    }

    const base={
      streaming,streamingNote:sNote,userDate:'',note:'',
      tmdbFetched:!!sel,tvDetailsFetched:false,
      poster:sel?.poster||null,description:sel?.description||'',
      tmdbDate:sel?.date||'',tmdbId:sel?.tmdbId||null,
      showKey:null,seasonNote:'',yearRange:'',inTheaters:false,autoCreated:false,
    };

    if(isRewatch){
      let seasonNote='',yearRange='';
      if(mtype==='tv'&&sel?.tmdbId){
        const dets=tvDets||(await fetchTVDetails(sel.tmdbId));
        if(dets){
          const cur=dets.currentSeason;
          const startYear=dets.firstAirDate?.slice(0,4)||'';
          const endYear=cur?.date?.slice(0,4)||startYear;
          seasonNote=dets.totalSeasons>1?`Season 1–${dets.totalSeasons}`:`Season ${dets.totalSeasons}`;
          yearRange=startYear&&endYear&&startYear!==endYear?`${startYear}–${endYear}`:startYear;
          if(cur)base.tmdbDate=cur.date;
          base.showKey=sel.tmdbId?showKey(sel.tmdbId):null;
        }
      }
      onAdd({...base,id:uid(),type:mtype,category:'rewatch',title,seasonNote,yearRange,tvDetailsFetched:mtype==='tv'});
    }else if(mtype==='movie'){
      const cat=sel?.date&&sel.date>=TODAY()?'comingSoon':'released';
      onAdd({...base,id:uid(),type:'movie',category:cat,title});
    }else{
      // TV watch — use manualSeason + optional upcoming from panel
      const sk=sel?.tmdbId?showKey(sel.tmdbId):null;
      const relDate=tvDets?.currentSeason?.date||sel?.date||'';
      onAdd({...base,id:uid(),type:'tv',category:'released',title,
        tmdbDate:relDate,seasonNote:`Season ${manualSeason}`,
        showKey:sk,tvDetailsFetched:true});
      if(trackUpcoming&&upcomingSeasNum){
        const seasNum=parseInt(upcomingSeasNum)||(manualSeason+1);
        const yrStr=upcomingYr.trim();
        const tmdbUpDate=tvDets?.upcomingSeason?.date||'';
        onAdd({...base,id:uid(),type:'tv',category:'comingSoon',title,
          tmdbDate:tmdbUpDate,
          userDate:!tmdbUpDate&&yrStr?yrStr:'',
          seasonNote:`Season ${seasNum}`,
          showKey:sk,streaming:[],autoCreated:false,tvDetailsFetched:true});
      }
    }
    setAdding(false);onClose();
  };

  const showTVPanel=mtype==='tv'&&intent==='watch'&&!!sel;

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="dm-drag"/>
        <div className="modal-title">Add to Watchlist</div>
        <div className="row2">
          <select className="msel" value={mtype} onChange={e=>{setMtype(e.target.value);setResults([]);setSel(null);resetTV();}}>
            <option value="movie">Movie</option>
            <option value="tv">TV Show</option>
          </select>
        </div>
        <div className="intent-toggle" style={{marginBottom:12}}>
          <button className={`intent-btn${intent==='watch'?' on':''}`} onClick={()=>{setIntent('watch');resetTV();}}>
            Want to Watch
          </button>
          <button className={`intent-btn${intent==='rewatch'?' on':''}`} onClick={()=>{setIntent('rewatch');resetTV();}}>
            Rewatch
          </button>
        </div>
        <div className="row2" style={{marginBottom:12}}>
          <input ref={ref} className="minput" style={{marginBottom:0,flex:1}} placeholder="Search title…"
            value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()}/>
          <button className="btn btn-gold" onClick={doSearch} style={{flexShrink:0}}>
            {loading?<span className="spinner"/>:'Search'}
          </button>
        </div>
        {results.length>0&&(
          <div className="results">
            {results.map(r=>(
              <div key={r.tmdbId} className={`ritem${sel?.tmdbId===r.tmdbId?' sel':''}`} onClick={()=>selectResult(r)}>
                {r.poster
                  ?<img className="rposter" src={r.poster} alt={r.title}/>
                  :<div className="rposter" style={{display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text2)',height:72}}>?</div>
                }
                <div className="rinfo">
                  <div className="rtitle">{r.title}</div>
                  {r.year&&<div className="ryear">{r.year}</div>}
                  <div className="rdesc">{r.description}</div>
                </div>
              </div>
            ))}
          </div>
        )}
        {showTVPanel&&(
          <div className="tv-sp">
            <div className="tv-sp-title">Season setup</div>
            {tvFetching?(
              <div style={{color:'var(--text2)',fontSize:13,display:'flex',alignItems:'center',gap:8}}>
                Loading season info <span className="spinner"/>
              </div>
            ):(
              <>
                <div className="tv-sp-row">
                  <span className="tv-sp-label">Released season</span>
                  <div className="stepper">
                    <button className="stepper-btn" onClick={()=>setManualSeason(s=>Math.max(1,s-1))}>−</button>
                    <span className="stepper-val">Season {manualSeason}</span>
                    <button className="stepper-btn" onClick={()=>setManualSeason(s=>s+1)}>+</button>
                  </div>
                </div>
                <div className="tv-sp-toggle" onClick={()=>setTrackUpcoming(v=>!v)}>
                  <span className={`tv-sp-check${trackUpcoming?' on':''}`}>{trackUpcoming?'✓':'○'}</span>
                  <span className="tv-sp-label">Track upcoming season</span>
                </div>
                {trackUpcoming&&(
                  <div className="tv-sp-upcoming">
                    <input className="minput" style={{marginBottom:0,width:90}} type="number"
                      placeholder="Season #" value={upcomingSeasNum}
                      onChange={e=>setUpcomingSeasNum(e.target.value)}/>
                    <input className="minput" style={{marginBottom:0,flex:1}}
                      placeholder="Expected year (e.g. 2027)" value={upcomingYr}
                      onChange={e=>setUpcomingYr(e.target.value)}/>
                  </div>
                )}
              </>
            )}
          </div>
        )}
        <input className="minput" placeholder="Streaming service (optional — auto-detected)" value={svc} onChange={e=>setSvc(e.target.value)}/>
        <input className="minput" style={{marginBottom:0}} placeholder="Price note (e.g. $5.99)" value={sNote} onChange={e=>setSNote(e.target.value)}/>
        <div className="mactions">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-gold" onClick={handleAdd} disabled={adding||tvFetching}>
            {adding?<span className="spinner"/>:sel?`Add "${sel.title.slice(0,22)}${sel.title.length>22?'…':''}"` :'Add Item'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── APP ── */
function App(){
  const[items,setItems]=useState(()=>{
    try{
      const s=localStorage.getItem('watchlist-v5');
      if(s)return autoMove(JSON.parse(s));
    }catch{}
    return autoMove(DATA);
  });
  const[tab,setTab]=useState('movie');
  const[section,setSection]=useState('released');
  const[q,setQ]=useState('');
  const[showAdd,setShowAdd]=useState(false);
  const[detail,setDetail]=useState(null);
  const[done,setDone]=useState(0);
  const[total,setTotal]=useState(0);
  const[fetching,setFetching]=useState(false);

  useEffect(()=>{
    try{localStorage.setItem('watchlist-v5',JSON.stringify(items));}catch{}
  },[items]);

  useEffect(()=>{
    const needBasic=items.filter(i=>!i.tmdbFetched);
    const needTV=items.filter(i=>i.type==='tv'&&i.tmdbFetched&&!i.tvDetailsFetched&&i.tmdbId);
    const tot=needBasic.length+needTV.length;
    if(!tot)return;
    setFetching(true);setTotal(tot);setDone(0);

    const applyUpdate=(id,upd)=>{
      setItems(prev=>{
        const idx=prev.findIndex(x=>x.id===id);
        if(idx===-1)return prev;
        const{_companionCat,_companionEp,...clean}=upd;
        const next=[...prev];
        next[idx]={...next[idx],...clean};
        // Create companion card if needed and not already present
        if(_companionCat&&_companionEp){
          const sk=next[idx].showKey;
          if(sk&&!prev.some(x=>x.showKey===sk&&x.category===_companionCat)){
            next.push(makeCompanion(next[idx],_companionCat,_companionEp));
          }
        }
        return next;
      });
    };

    const basicTasks=needBasic.map(item=>async()=>{
      const upd=await fetchItem(item);
      applyUpdate(item.id,upd);
      setDone(n=>n+1);
    });

    const tvTasks=needTV.map(item=>async()=>{
      const dets=await fetchTVDetails(item.tmdbId);
      const upd=applyTVDets(item,dets);
      applyUpdate(item.id,upd);
      setDone(n=>n+1);
    });

    runQ([...basicTasks,...tvTasks],5)
      .finally(()=>{setFetching(false);setItems(prev=>autoMove(prev));});
  },[]);// eslint-disable-line

  const removeItem=useCallback(id=>{
    setItems(p=>p.filter(i=>i.id!==id));
    setDetail(null);
  },[]);

  const addItem=useCallback(item=>setItems(p=>[...p,item]),[]);

  const exportJSON=()=>{
    const b=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');a.href=u;a.download='watchlist.json';a.click();
    URL.revokeObjectURL(u);
  };

  const counts=useMemo(()=>{
    const mv=items.filter(i=>i.type==='movie');
    const tv=items.filter(i=>i.type==='tv');
    const sc=arr=>({
      released:arr.filter(i=>i.category==='released').length,
      comingSoon:arr.filter(i=>i.category==='comingSoon').length,
      rewatch:arr.filter(i=>i.category==='rewatch').length,
    });
    return{movie:{total:mv.length,...sc(mv)},tv:{total:tv.length,...sc(tv)}};
  },[items]);

  const visible=useMemo(()=>{
    let arr=items.filter(i=>i.type===tab&&i.category===section);
    if(q)arr=arr.filter(i=>i.title.toLowerCase().includes(q.toLowerCase()));
    return sortedItems(arr,section);
  },[items,tab,section,q]);

  const pct=total>0?(done/total)*100:100;
  const tc=counts[tab];
  const SECTIONS=[
    ['released','Released',tc.released],
    ['comingSoon','Coming Soon',tc.comingSoon],
    ['rewatch','Rewatch',tc.rewatch],
  ];

  return(
    <>
      <div className="hdr">
        <div className="hdr-top">
          <div className="hdr-title">
            🍿 Watchlist
            <small>{items.length} titles{fetching?` · ${done}/${total}`:''}</small>
          </div>
          <input className="search" placeholder="Search…" value={q} onChange={e=>setQ(e.target.value)}/>
          <div className="hdr-btns">
            <button className="btn" onClick={exportJSON}>⬇ JSON</button>
            <button className="btn btn-gold" onClick={()=>setShowAdd(true)}>＋ Add</button>
          </div>
        </div>
        {fetching&&(
          <div className="prog-wrap">
            <div className="prog-label">Fetching posters &amp; streaming info… {done}/{total}</div>
            <div className="prog-track"><div className="prog-fill" style={{width:`${pct}%`}}/></div>
          </div>
        )}
        <div className="tabs">
          <button className={`tab${tab==='movie'?' on':''}`} onClick={()=>setTab('movie')}>
            Movies ({counts.movie.total})
          </button>
          <button className={`tab${tab==='tv'?' on':''}`} onClick={()=>setTab('tv')}>
            TV Shows ({counts.tv.total})
          </button>
        </div>
        <div className="seg-wrap">
          <div className="seg">
            {SECTIONS.map(([key,label,cnt])=>(
              <button key={key} className={`seg-btn${section===key?' on':''}`} onClick={()=>setSection(key)}>
                {label}<span className="seg-cnt">{cnt}</span>
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="main">
        {q&&!visible.length&&<div className="empty">No results for "{q}"</div>}
        {!q&&!visible.length&&<div className="empty">Nothing here yet — tap ＋ Add to get started</div>}
        <div className="grid">
          {visible.map(it=><Card key={it.id} item={it} onTap={setDetail}/>)}
        </div>
      </div>

      {detail&&(
        <DetailModal
          item={detail}
          onClose={()=>setDetail(null)}
          onWatched={removeItem}
          onRemove={removeItem}
        />
      )}
      {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={addItem}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
