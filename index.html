    document.head.appendChild(ml);
  }catch(e){}

<style>
:root{
  --bg:#0d0d16;--bg2:#13131f;--card:#18182a;--card2:#1f1f35;
  --border:rgba(255,255,255,.07);--text:#e8e8f2;--text2:#8888aa;
  --accent:#e5b25d;--accent2:#c4891a;--red:#e54b4b;--green:#1a9c5b;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
.hdr{background:linear-gradient(180deg,#1c1530 0%,#0d0d16 100%);border-bottom:1px solid var(--border);padding:12px 14px 0;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.6)}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.hdr-title{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-.5px;white-space:nowrap}
.hdr-title small{color:var(--text2);font-size:11px;font-weight:400;margin-left:8px}
.search{flex:1;min-width:100px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:var(--text2)}
.hdr-btns{display:flex;gap:7px;flex-shrink:0;margin-left:auto}
.btn{background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:13px;padding:7px 12px;transition:background .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn:hover{background:rgba(255,255,255,.14)}
.btn:active{opacity:.8}
.btn-gold{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.btn-gold:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-watched{background:var(--green);border-color:var(--green);color:#fff;font-weight:600}
.btn-watched:hover{background:#158041;border-color:#158041}
.btn-danger{background:rgba(229,75,75,.12);border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(229,75,75,.25)}
.prog-wrap{margin-bottom:10px}
.prog-label{color:var(--text2);font-size:11px;margin-bottom:4px}
.prog-track{background:rgba(255,255,255,.06);border-radius:3px;height:3px;overflow:hidden}
.prog-fill{background:var(--accent);height:100%;transition:width .3s}
.tabs{display:flex}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);cursor:pointer;font-size:14px;font-weight:600;padding:10px 18px;transition:color .2s,border-color .2s;-webkit-tap-highlight-color:transparent}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.on){color:var(--text)}
.seg-wrap{padding:10px 0 12px}
.seg{background:rgba(255,255,255,.07);border-radius:11px;display:flex;padding:3px;gap:2px}
.seg-btn{background:none;border:none;border-radius:9px;color:var(--text2);cursor:pointer;flex:1;font-size:12px;font-weight:600;padding:8px 4px;transition:all .2s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.seg-btn.on{background:var(--card2);color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,.5)}
.seg-cnt{font-size:11px;font-weight:400;opacity:.65;margin-left:3px}
.main{padding:14px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.empty{color:var(--text2);font-size:13px;padding:40px;text-align:center}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.65)}
.card:active{transform:scale(.97);opacity:.9}
.poster{aspect-ratio:2/3;background:var(--card2);overflow:hidden;position:relative}
.poster img{height:100%;object-fit:cover;width:100%;display:block}
.poster-ph{align-items:center;color:var(--text2);display:flex;flex-direction:column;font-size:28px;height:100%;justify-content:center;gap:6px}
.poster-ph span{font-size:10px;padding:0 8px;text-align:center;line-height:1.3}
.cbody{padding:8px}
.ctitle{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cseason{color:var(--text2);font-size:10px;font-style:italic;margin-bottom:2px}
.cdate{color:var(--accent);font-size:11px;font-weight:500;margin-bottom:3px}
.badges{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.badge{border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.3px;padding:2px 5px;white-space:nowrap}
.cdesc{color:var(--text2);font-size:10px;line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.in-theaters-tag{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(135deg,#b52a2a,#e03c3c);color:#fff;font-size:8px;font-weight:800;letter-spacing:.8px;padding:4px 6px;text-align:center;text-transform:uppercase}
.overlay{align-items:flex-end;background:rgba(0,0,0,.82);display:flex;inset:0;justify-content:center;padding:0;position:fixed;z-index:200}
@media(min-width:500px){.overlay{align-items:center;padding:16px}}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px 20px 0 0;max-height:90vh;width:100%;overflow-y:auto;padding:20px}
@media(min-width:500px){.modal{border-radius:16px;max-width:480px;max-height:85vh}}
.dm-hero{display:flex;gap:14px;margin-bottom:16px}
.dm-poster{border-radius:10px;flex-shrink:0;object-fit:cover;width:90px;align-self:flex-start}
.dm-poster-ph{width:90px;height:135px;background:var(--card2);border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px}
.dm-info{flex:1;min-width:0}
.dm-title{font-size:17px;font-weight:700;line-height:1.3;margin-bottom:4px}
.dm-season{color:var(--text2);font-size:12px;font-style:italic;margin-bottom:5px}
.dm-date{color:var(--accent);font-size:13px;font-weight:600;margin-bottom:8px}
.dm-badges{display:flex;flex-wrap:wrap;gap:5px}
.dm-desc{color:var(--text2);font-size:13px;line-height:1.65;margin-bottom:20px}
.dm-actions{display:flex;gap:8px}
.dm-actions .btn{flex:1;padding:11px 8px;font-size:13px;font-weight:600;text-align:center}
.dm-drag{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:14px}
.row2{display:flex;gap:8px;margin-bottom:10px}
.minput{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;margin-bottom:10px;outline:none;padding:9px 13px;width:100%;transition:border-color .2s}
.minput:focus{border-color:var(--accent)}
.msel{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px;width:100%;outline:none}
.msel option{background:var(--card)}
.intent-toggle{display:flex;gap:0;margin-bottom:12px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.intent-btn{background:none;border:none;color:var(--text2);cursor:pointer;flex:1;font-size:13px;font-weight:600;padding:9px;transition:all .2s}
.intent-btn.on{background:var(--accent);color:#000}
.results{margin-bottom:12px}
.ritem{align-items:flex-start;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;cursor:pointer;display:flex;gap:11px;margin-bottom:7px;padding:10px;transition:background .15s,border-color .15s}
.ritem:hover,.ritem.sel{background:rgba(229,178,93,.1);border-color:var(--accent)}
.rposter{background:var(--card2);border-radius:6px;flex-shrink:0;height:72px;object-fit:cover;width:48px}
.rinfo{flex:1;min-width:0}
.rtitle{font-size:13px;font-weight:600;margin-bottom:3px}
.ryear{color:var(--accent);font-size:11px;margin-bottom:3px}
.rdesc{color:var(--text2);font-size:11px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.spinner{animation:spin 1s linear infinite;border:2px solid rgba(255,255,255,.15);border-top-color:var(--accent);border-radius:50%;display:inline-block;height:15px;width:15px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.tv-sp{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px}
.tv-sp-title{color:var(--text2);font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.tv-sp-upcoming{display:flex;gap:8px}
/* Epic detail modal */
.dm-outer{align-items:center;display:flex;flex-direction:column;width:100%}
@media(min-width:500px){.dm-outer{max-width:480px}}
.dm-poster-float{border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.55);flex-shrink:0;margin-bottom:-24px;overflow:hidden;width:150px;z-index:1}
.dm-poster-float img{display:block;width:100%}
.dm-poster-ph-lg{align-items:center;background:var(--card2);display:flex;font-size:56px;height:225px;justify-content:center;width:150px}
.dm-sheet{background:var(--card);border-radius:20px 20px 0 0;max-height:82vh;overflow-y:auto;padding:38px 20px 20px;position:relative;width:100%}
@media(min-width:500px){.dm-sheet{border-radius:16px;max-height:78vh}}
.dm-sheet-drag{background:rgba(255,255,255,.2);border-radius:2px;height:4px;left:50%;position:absolute;top:10px;transform:translateX(-50%);width:36px}
.dm-sheet-title{font-size:20px;font-weight:800;line-height:1.25;margin-bottom:6px;text-align:center}
.dm-sheet-meta{align-items:center;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px}
/* Season checkboxes */
.season-label{color:var(--text2);font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase}
.season-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.season-cb{align-items:center;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;display:flex;font-size:13px;font-weight:600;gap:4px;padding:8px 13px;-webkit-tap-highlight-color:transparent;transition:all .2s}
.season-cb.on{background:rgba(26,156,91,.2);border-color:var(--green);color:var(--green)}
.season-cb-all{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;margin-bottom:8px;padding:8px 12px;text-align:left;-webkit-tap-highlight-color:transparent;width:100%;transition:all .2s}
.season-cb-all.on{background:rgba(26,156,91,.12);border-color:var(--green);color:var(--green)}
.nsz-toggle{align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;cursor:pointer;display:flex;gap:10px;margin-bottom:14px;padding:11px 13px;-webkit-tap-highlight-color:transparent;transition:border-color .2s}
.nsz-toggle.on{border-color:var(--green)}
.nsz-check{color:var(--text2);font-size:16px;flex-shrink:0;transition:color .2s}
.nsz-check.on{color:var(--green)}
.nsz-text{flex:1}
.nsz-label{color:var(--text);font-size:13px;font-weight:600}
.nsz-date{color:var(--text2);font-size:11px;margin-top:2px}
.move-btn{background:rgba(229,178,93,.1);border:1px solid var(--accent);border-radius:8px;color:var(--accent);cursor:pointer;font-size:13px;font-weight:600;padding:11px 8px;flex:1;text-align:center;-webkit-tap-highlight-color:transparent;transition:background .2s}
.move-btn:hover{background:rgba(229,178,93,.2)}
.watch-links{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.watch-link{border-radius:10px;display:block;font-size:14px;font-weight:700;padding:13px 16px;text-align:center;text-decoration:none;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.watch-link:active{opacity:.75}
/* Favorites */
.fav-view{padding:0}
.fav-row{align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;display:flex;gap:12px;margin-bottom:8px;padding:10px 12px;-webkit-tap-highlight-color:transparent;transition:background .15s}
.fav-row:hover{background:var(--card2)}
.fav-row:active{opacity:.85}
.fav-thumb{border-radius:6px;flex-shrink:0;height:54px;object-fit:cover;width:36px}
.fav-thumb-ph{align-items:center;background:var(--card2);display:flex;font-size:18px;justify-content:center}
.fav-row-info{flex:1;min-width:0}
.fav-row-title{font-size:13px;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-row-year{color:var(--accent);font-size:11px;font-weight:500;margin-top:2px}
.genre-section{margin-bottom:14px}
.genre-hdr{align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;display:flex;font-size:14px;font-weight:700;gap:8px;padding:10px 14px;width:100%;-webkit-tap-highlight-color:transparent;transition:background .15s;margin-bottom:6px;text-align:left}
.genre-hdr:hover{background:rgba(255,255,255,.08)}
.genre-name{flex:1}
.genre-cnt{color:var(--text2);font-size:12px;font-weight:400}
.genre-arrow{color:var(--text2);font-size:11px}
.genre-items{padding:0 2px}
/* Best Picture */
.bp-section{background:linear-gradient(135deg,#1a1025 0%,#0d0d16 100%);border:1px solid rgba(229,178,93,.25);border-radius:14px;margin-bottom:20px;overflow:hidden}
.bp-header{align-items:center;background:linear-gradient(90deg,rgba(229,178,93,.18),transparent);border-bottom:1px solid rgba(229,178,93,.15);color:var(--accent);display:flex;font-size:12px;font-weight:800;gap:8px;letter-spacing:.9px;padding:12px 16px;text-transform:uppercase}
.bp-list{}
.bp-row{align-items:center;border-bottom:1px solid rgba(255,255,255,.04);cursor:default;display:flex;gap:12px;min-height:46px;padding:8px 16px;transition:background .15s}
.bp-row.bp-filled{cursor:pointer}
.bp-row.bp-filled:hover{background:rgba(229,178,93,.07)}
.bp-row.bp-filled:active{opacity:.8}
.bp-row:last-child{border-bottom:none}
.bp-year{color:var(--accent);font-size:13px;font-weight:700;min-width:38px}
.bp-title{color:var(--text);flex:1;font-size:13px;font-weight:500}
.bp-empty{color:var(--text2);font-style:italic;font-weight:400}
.bp-thumb{border-radius:4px;flex-shrink:0;height:36px;object-fit:cover;width:24px}
/* Star */
.star-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:22px;line-height:1;padding:2px 6px;-webkit-tap-highlight-color:transparent;transition:color .15s,transform .2s}
.star-btn.on{color:#f5c518}
.star-btn:active{transform:scale(.85)}
/* Genre select in fav detail */
.fav-genre-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.crown-toggle{align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;cursor:pointer;display:flex;gap:10px;margin-bottom:14px;padding:11px 14px;-webkit-tap-highlight-color:transparent;transition:border-color .2s}
.crown-toggle.on{background:rgba(245,197,24,.08);border-color:#f5c518}
</style>

/* ── TMDB API ── */
async function tmdbSearch(title,type){
  const q=title.replace(/\s*\(.*?\)/g,'').replace(/:\s*(season|s)\s*\d+/i,'').trim();
  try{
    const r=await fetch(
      `https://api.themoviedb.org/3/search/${type==='movie'?'movie':'tv'}?query=${encodeURIComponent(q)}&language=en-US&page=1`,
      {headers:{'Authorization':`Bearer ${TOKEN}`}}
    );
    if(!r.ok)return[];
    const d=await r.json();
    return(d.results||[]).slice(0,6).map(x=>({
      tmdbId:x.id,title:x.title||x.name||'',
      year:(x.release_date||x.first_air_date||'').slice(0,4),
      date:x.release_date||x.first_air_date||'',
      poster:x.poster_path?`${IMG}${x.poster_path}`:null,
      description:x.overview||'',
    }));
  }catch{return[];}
}

async function getProviders(tmdbId,type){
  try{
    const r=await fetch(
      `https://api.themoviedb.org/3/${type==='movie'?'movie':'tv'}/${tmdbId}/watch/providers`,
      {headers:{'Authorization':`Bearer ${TOKEN}`}}
    );
    if(!r.ok)return[];
    const d=await r.json();
    const us=d.results?.US;
    if(!us)return[];
    const all=[...(us.flatrate||[]),...(us.free||[])];
    return[...new Set(all.map(p=>PMAP[p.provider_name]).filter(Boolean))];
  }catch{return[];}
}

async function fetchTVDetails(tmdbId){
  try{
    const r=await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}`,{headers:{'Authorization':`Bearer ${TOKEN}`}});
    if(!r.ok)return null;
    const d=await r.json();
    const next=d.next_episode_to_air;
    const last=d.last_episode_to_air;
    const isNewSeason=next&&last&&next.season_number>last.season_number;
    return{
      currentSeason:last?{date:last.air_date,season:last.season_number}:null,
      upcomingSeason:isNewSeason?{date:next.air_date,season:next.season_number}:null,
      totalSeasons:d.number_of_seasons||1,
      releasedSeasons:last?last.season_number:(d.number_of_seasons||1),
      firstAirDate:d.first_air_date||'',
    };
  }catch{return null;}
}

function buildTVDisplay(dets,cat){
  // Returns {seasonNote,yearRange,totalSeasons,firstAirDate,tmdbDate}
  const{currentSeason:cur,upcomingSeason:upc,totalSeasons,releasedSeasons,firstAirDate:fa}=dets;
  const startYear=(fa||'').slice(0,4);
  const endYear=cur?.date?.slice(0,4)||startYear;
  const yr=startYear&&endYear&&startYear!==endYear?`${startYear}–${endYear}`:startYear;
  if(cat==='rewatch'){
    const n=totalSeasons||1;
    return{seasonNote:n>1?`Season 1–${n}`:'Season 1',yearRange:yr,totalSeasons:n,firstAirDate:fa||'',tmdbDate:cur?.date||''};
  }
  if(cat==='released'||cat==='favorite'){
    const n=releasedSeasons||totalSeasons||null;
    return{seasonNote:n>1?`Season 1–${n}`:(n===1?'Season 1':''),yearRange:yr,totalSeasons:n,firstAirDate:fa||'',tmdbDate:cur?.date||''};
  }
  // comingSoon (Ongoing)
  return{totalSeasons:releasedSeasons||totalSeasons||null,firstAirDate:fa||'',tmdbDate:cur?.date||'',newSeasonDate:upc?.date||''};
}

function applyTVDets(item,dets){
  if(!dets)return{tvDetailsFetched:true};
  const sk=item.tmdbId?showKey(item.tmdbId):null;
  const built=buildTVDisplay(dets,item.category);
  return{tvDetailsFetched:true,showKey:sk,...built};
}

async function fetchItem(item){
  const results=await tmdbSearch(item.title,item.type);
  // For comingSoon prefer a result with a future release date
  let r=null;
  if(item.category==='comingSoon'&&results.length>1){
    r=results.find(x=>x.date&&x.date>=TODAY())||results[0];
  }else{
    r=results[0]||null;
  }
  if(!r)return{tmdbFetched:true,tvDetailsFetched:item.type==='tv'};
  const update={poster:r.poster,description:r.description,tmdbDate:r.date,tmdbId:r.tmdbId,tmdbFetched:true};
  // Auto-fetch streaming only when user hasn't specified any
  if(!item.streaming||!item.streaming.length){
    const pvs=await getProviders(r.tmdbId,item.type);
    if(pvs.length)update.streaming=pvs;
  }
  if(item.type==='tv'){
    const dets=await fetchTVDetails(r.tmdbId);
    const tvUpd=applyTVDets({...item,...update},dets);
    Object.assign(update,tvUpd);
  }
  return update;
}

async function runQ(tasks,limit){
  if(!tasks.length)return;
  return new Promise(res=>{
    const q=[...tasks];let active=0;
    function next(){
      while(active<limit&&q.length){
        const t=q.shift();active++;
        Promise.resolve(t()).finally(()=>{active--;next();if(!active&&!q.length)res();});
      }
      if(!active&&!q.length)res();
    }
    next();
  });
}

/* ── DATE UTILS ── */
function parseDate(s){
  if(!s)return null;
  s=s.trim();
  if(!s||s==='TBD'||s==='?')return null;
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return new Date(s+'T00:00:00');
  const a=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
  if(a)return new Date(2000+~~a[3],~~a[1]-1,~~a[2]);
  const b=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(b)return new Date(~~b[3],~~b[1]-1,~~b[2]);
  const c=s.match(/^([A-Za-z]+)\s+(\d{4})$/);
  if(c){const M={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    const m=M[c[1].toLowerCase().slice(0,3)];if(m!=null)return new Date(~~c[2],m,1);}
  return null;
}

function autoMove(items){
  const now=Date.now(),DAYS=45;
  return items.map(i=>{
    // TV shows are never in theaters
    if(i.type==='tv') return i.inTheaters?{...i,inTheaters:false}:i;
    if(i.category==='comingSoon'){
      const d=parseDate(i.tmdbDate)||parseDate(i.userDate);
      if(!d||d.getTime()>now)return i;
      return{...i,category:'released',inTheaters:(now-d.getTime())/86400000<=DAYS};
    }
    if(i.category==='released'){
      // Re-evaluate inTheaters so newly-released movies pick up the tag
      const d=parseDate(i.tmdbDate)||parseDate(i.userDate);
      const days=d?(now-d.getTime())/86400000:null;
      const should=days!==null&&days>=0&&days<=DAYS;
      return should===i.inTheaters?i:{...i,inTheaters:should};
    }
    return i;
  });
}

function formatDate(item){
  if(item.yearRange)return item.yearRange;
  const d=parseDate(item.tmdbDate)||parseDate(item.userDate);
  if(!d){
    if(item.userDate&&/^\d{4}$/.test(item.userDate.trim()))return item.userDate.trim();
    if(item.category==='comingSoon')return'TBD';
    return'';
  }
  if(item.category==='comingSoon'||item.inTheaters)
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  return String(d.getFullYear());
}

function sortedItems(arr,sec){
  const ms=i=>{const d=parseDate(i.tmdbDate)||parseDate(i.userDate);return d?d.getTime():null;};
  return[...arr].sort((a,b)=>{
    const da=ms(a),db=ms(b);
    if(da==null&&db==null)return 0;
    if(da==null)return 1;if(db==null)return-1;
    return sec==='comingSoon'?da-db:db-da;
  });
}

function Card({item,onTap}){
  const isOngoing=item.type==='tv'&&item.category==='comingSoon';

  // Season / status line
  let seasonLine='';
  if(isOngoing){
    if(item.newSeasonAnnounced){
      const d=item.newSeasonDate?parseDate(item.newSeasonDate):null;
      const ds=d?d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
      seasonLine=`New season coming${ds?` · ${ds}`:''}`;
    }else{
      const w=item.watchedSeasons?.length||0,t=item.totalSeasons||0;
      seasonLine=t>0?(w>0?`${w}/${t} seasons watched`:`${t} seasons`):'';
    }
  }else{
    seasonLine=item.seasonNote||'';
  }

  // Date line — hide for Ongoing (info already in seasonLine)
  const dateStr=isOngoing?'':formatDate(item);

  return(
    <div className="card" onClick={()=>onTap(item)}>
      <div className="poster">
        {item.poster
          ?<img src={item.poster} alt={item.title} loading="lazy"/>
          :<div className="poster-ph">🍿<span>{item.title}</span></div>
        }
      </div>
      <div className="cbody">
        <div className="ctitle">{item.title}</div>
        {seasonLine&&<div className="cseason">{seasonLine}</div>}
        {dateStr&&<div className="cdate">{dateStr}</div>}
        {(item.inTheaters||item.streaming?.length>0)&&(
          <div className="badges">
            {item.inTheaters&&<span className="badge" style={{background:'linear-gradient(135deg,#b52a2a,#e03c3c)',color:'#fff'}}>🎬 In Theaters</span>}
            {item.streaming&&item.streaming.map(s=><Badge key={s} svc={s} note={item.streamingNote}/>)}
          </div>
        )}
        {item.description&&<div className="cdesc">{item.description}</div>}
      </div>
    </div>
  );
}

    return(
      <div className="fav-view">
        {!sorted.length&&<div className="empty">No TV favorites yet — tap ⭐ in a show's detail</div>}
        {sorted.map(i=><FavRow key={i.id} item={i} onTap={onTap}/>)}
      </div>
    );
  }
  const bpMovies=favs.filter(i=>i.bestPictureYear);
  return(
    <div className="fav-view">
      {!favs.length&&<div className="empty">No movie favorites yet — tap ⭐ in a movie's detail</div>}
      {favs.length>0&&(
        <>
          <BestPictureSection items={bpMovies} onTap={onTap}/>
          {GENRES.map(g=>{
            const gi=favs.filter(i=>i.genre===g).sort((a,b)=>{
              const da=parseDate(a.tmdbDate)||parseDate(a.userDate);
              const db=parseDate(b.tmdbDate)||parseDate(b.userDate);
              if(!da&&!db)return a.title.localeCompare(b.title);
              if(!da)return 1;if(!db)return-1;
              return db.getTime()-da.getTime();
            });
            return<GenreSection key={g} genre={g} items={gi} onTap={onTap}/>;
          })}
          {(()=>{
            const unc=favs.filter(i=>!i.genre).sort((a,b)=>{
              const da=parseDate(a.tmdbDate)||parseDate(a.userDate);
              const db=parseDate(b.tmdbDate)||parseDate(b.userDate);
              if(!da&&!db)return a.title.localeCompare(b.title);
              if(!da)return 1;if(!db)return-1;
              return db.getTime()-da.getTime();
            });
            return unc.length?<GenreSection genre="Uncategorized" items={unc} onTap={onTap}/>:null;
          })()}
        </>
      )}
    </div>
  );
}

function DetailModal({item,onClose,onWatched,onRemove,onUpdateItem}){
  const[watched,setWatched]=React.useState(new Set(item.watchedSeasons||[]));
  const[newSznOn,setNewSznOn]=React.useState(item.newSeasonAnnounced||false);
  const[newSznDate,setNewSznDate]=React.useState(item.newSeasonDate||'');
  const[moving,setMoving]=React.useState(false);
  const[sznFetching,setSznFetching]=React.useState(false);

  const isTV=item.type==='tv';
  const isStart=isTV&&item.category==='released';
  const isOngoing=isTV&&item.category==='comingSoon';
  const isMovie=item.type==='movie';

  // Hero meta line
  let heroSub='';
  if(isOngoing){
    if(newSznOn){
      const d=newSznDate?parseDate(newSznDate):null;
      const ds=d?d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
      heroSub=`New season coming${ds?` · ${ds}`:''}`;
    }else{
      const w=watched.size,t=item.totalSeasons||0;
      heroSub=t>0?(w>0?`${w}/${t} seasons watched`:`${t} seasons`):'';
    }
  }else{
    heroSub=item.seasonNote||'';
  }
  const showDate=!isOngoing;
  const date=showDate?formatDate(item):'';

  const toggleSeason=s=>{
    setWatched(prev=>{
      const n=new Set(prev);n.has(s)?n.delete(s):n.add(s);
      onUpdateItem(item.id,{watchedSeasons:Array.from(n)});
      return n;
    });
  };
  const toggleAll=()=>{
    const n=watched.size===item.totalSeasons?new Set():new Set(Array.from({length:item.totalSeasons},(_,i)=>i+1));
    setWatched(n);onUpdateItem(item.id,{watchedSeasons:Array.from(n)});
  };

  const handleNewSzn=async checked=>{
    setNewSznOn(checked);
    if(checked){
      let d=item.newSeasonDate||'';
      if(!d&&item.tmdbId){
        setSznFetching(true);
        const dets=await fetchTVDetails(item.tmdbId);
        d=dets?.upcomingSeason?.date||'';
        setSznFetching(false);
      }
      setNewSznDate(d);
      onUpdateItem(item.id,{newSeasonAnnounced:true,newSeasonDate:d});
    }else{
      onUpdateItem(item.id,{newSeasonAnnounced:false});
    }
  };

  const handleMoveToOngoing=async()=>{
    setMoving(true);
    const upd={category:'comingSoon',watchedSeasons:item.watchedSeasons||[]};
    if(item.tmdbId){
      const dets=await fetchTVDetails(item.tmdbId);
      if(dets){
        Object.assign(upd,{
          totalSeasons:dets.releasedSeasons||dets.totalSeasons||null,
          newSeasonDate:dets.upcomingSeason?.date||'',
          tmdbDate:dets.currentSeason?.date||item.tmdbDate,
          firstAirDate:dets.firstAirDate||item.firstAirDate||'',
          tvDetailsFetched:true,
        });
      }
    }
    onUpdateItem(item.id,upd);setMoving(false);onClose();
  };

  const handleMoveToRewatch=async()=>{
    setMoving(true);
    const upd={category:'rewatch',newSeasonAnnounced:false,newSeasonDate:'',watchedSeasons:[]};
    if(item.tmdbId){
      const dets=await fetchTVDetails(item.tmdbId);
      if(dets) Object.assign(upd,{tvDetailsFetched:true,...buildTVDisplay(dets,'rewatch')});
    }
    onUpdateItem(item.id,upd);setMoving(false);onClose();
  };

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="dm-outer" onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="dm-poster-float">
          {item.poster
            ?<img src={item.poster} alt={item.title}/>
            :<div className="dm-poster-ph-lg">🍿</div>
          }
        </div>
        <div className="dm-sheet">
          <div className="dm-sheet-drag"/>
          <div className="dm-sheet-title">{item.title}</div>
          <div className="dm-sheet-meta">
            {heroSub&&<span style={{color:'var(--text2)',fontSize:12}}>{heroSub}</span>}
            {date&&<span style={{color:'var(--accent)',fontSize:13,fontWeight:600}}>{date}</span>}
            {item.inTheaters&&<span className="badge" style={{background:'linear-gradient(135deg,#b52a2a,#e03c3c)',color:'#fff'}}>🎬 In Theaters</span>}
            <button className={`star-btn${item.favorite?' on':''}`}
              title={item.favorite?'Remove from favorites':'Add to favorites'}
              onClick={e=>{e.stopPropagation();onUpdateItem(item.id,{favorite:!item.favorite});}}>
              {item.favorite?'⭐':'☆'}
            </button>
          </div>
          {item.streaming&&item.streaming.length>0&&(
            <div className="watch-links">
              {item.streaming.map(svc=>{
                const url=SVC_LINKS[svc]?.(item.title);
                const s=SVC[svc]||{bg:'#444',fg:'#fff'};
                return url?(
                  <a key={svc} className="watch-link" href={url} target="_blank" rel="noopener noreferrer"
                     style={{background:s.bg,color:s.fg}}
                     onClick={e=>e.stopPropagation()}>
                    Watch on {svc}
                  </a>
                ):null;
              })}
            </div>
          )}
          {item.description&&<p className="dm-desc">{item.description}</p>}

          {isOngoing&&item.totalSeasons>0&&(
            <div>
              <div className="season-label">Seasons watched</div>
              <button className={`season-cb-all${watched.size===item.totalSeasons?' on':''}`} onClick={toggleAll}>
                {watched.size===item.totalSeasons?'✓ All seasons':'Select all seasons'}
              </button>
              <div className="season-grid">
                {Array.from({length:item.totalSeasons},(_,i)=>i+1).map(s=>(
                  <button key={s} className={`season-cb${watched.has(s)?' on':''}`} onClick={()=>toggleSeason(s)}>
                    {watched.has(s)?'✓ ':''} S{s}
                  </button>
                ))}
              </div>
            </div>
          )}

          {isOngoing&&(
            <div className={`nsz-toggle${newSznOn?' on':''}`} onClick={()=>!sznFetching&&handleNewSzn(!newSznOn)}>
              <span className={`nsz-check${newSznOn?' on':''}`}>
                {sznFetching?<span className="spinner"/>:(newSznOn?'✓':'○')}
              </span>
              <div className="nsz-text">
                <div className="nsz-label">New season announced</div>
                {newSznOn&&newSznDate&&(
                  <div className="nsz-date">
                    {parseDate(newSznDate)?.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})||newSznDate}
                  </div>
                )}
              </div>
            </div>
          )}

          <div className="dm-actions">
            <button className="btn" onClick={onClose}>Close</button>
            <button className="btn btn-danger" onClick={()=>{onRemove(item.id);onClose();}}>Remove</button>
            {isStart&&(
              <button className="move-btn" onClick={handleMoveToOngoing} disabled={moving}>
                {moving?<span className="spinner"/>:'Move to Ongoing →'}
              </button>
            )}
            {isOngoing&&(
              <button className="move-btn" onClick={handleMoveToRewatch} disabled={moving}>
                {moving?<span className="spinner"/>:'Move to Rewatch →'}
              </button>
            )}
            {isMovie&&item.category!=='comingSoon'&&(
              <button className="btn btn-watched" onClick={()=>{onWatched(item.id);onClose();}}>✓ Watched</button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function AddModal({onClose,onAdd}){
  const[q,setQ]=useState('');
  const[mtype,setMtype]=useState('movie');
  const[movieIntent,setMovieIntent]=useState('watch');
  const[movieGenre,setMovieGenre]=useState('');
  const[tvCat,setTvCat]=useState('released'); // released=Start, comingSoon=Ongoing, rewatch
  const[results,setResults]=useState([]);
  const[sel,setSel]=useState(null);
  const[loading,setLoading]=useState(false);
  const[adding,setAdding]=useState(false);
  const[svc,setSvc]=useState('');
  const[sNote,setSNote]=useState('');
  const[tvDets,setTvDets]=useState(null);
  const[tvFetching,setTvFetching]=useState(false);
  const[tvSeasons,setTvSeasons]=useState(0);
  const[watchedSeasons,setWatchedSeasons]=useState(new Set());
  const[newSznOn,setNewSznOn]=useState(false);
  const[newSznDate,setNewSznDate]=useState('');
  const ref=useRef(null);
  useEffect(()=>{ref.current?.focus();},[]);

  const resetTV=()=>{setTvDets(null);setTvFetching(false);setTvSeasons(0);setWatchedSeasons(new Set());setNewSznOn(false);setNewSznDate('');};

  const selectResult=async r=>{
    setSel(r);
    if(mtype!=='tv'||tvCat!=='comingSoon'||!r.tmdbId)return;
    setTvFetching(true);setTvDets(null);
    const dets=await fetchTVDetails(r.tmdbId);
    setTvDets(dets);
    if(dets){
      setTvSeasons(dets.releasedSeasons||dets.totalSeasons||0);
      if(dets.upcomingSeason){setNewSznOn(true);setNewSznDate(dets.upcomingSeason.date||'');}
    }
    setTvFetching(false);
  };

  const doSearch=async()=>{
    if(!q.trim())return;
    setLoading(true);setSel(null);resetTV();
    const r=await tmdbSearch(q,mtype);
    const sorted=mtype==='movie'&&movieIntent==='watch'
      ?[...r].sort((a,b)=>{const af=a.date&&a.date>=TODAY()?1:0,bf=b.date&&b.date>=TODAY()?1:0;return bf-af;})
      :r;
    setResults(sorted);setLoading(false);
  };

  const toggleSeason=s=>setWatchedSeasons(p=>{const n=new Set(p);n.has(s)?n.delete(s):n.add(s);return n;});
  const toggleAll=()=>setWatchedSeasons(p=>p.size===tvSeasons?new Set():new Set(Array.from({length:tvSeasons},(_,i)=>i+1)));

  const handleAdd=async()=>{
    if(!sel&&!q.trim())return;
    setAdding(true);
    const title=sel?sel.title:q.trim();
    let streaming=svc?[svc]:[];
    if(!streaming.length&&sel?.tmdbId){const pvs=await getProviders(sel.tmdbId,mtype);if(pvs.length)streaming=pvs;}
    const base={
      streaming,streamingNote:sNote,userDate:'',note:'',tmdbFetched:!!sel,tvDetailsFetched:false,
      poster:sel?.poster||null,description:sel?.description||'',tmdbDate:sel?.date||'',tmdbId:sel?.tmdbId||null,
      showKey:null,seasonNote:'',yearRange:'',inTheaters:false,autoCreated:false,
      totalSeasons:null,watchedSeasons:[],newSeasonAnnounced:false,newSeasonDate:'',firstAirDate:'',
    };

    if(mtype==='movie'){
      if(movieIntent==='rewatch'){
        onAdd({...base,id:uid(),type:'movie',category:'rewatch',title});
      }else if(movieIntent==='favorite'){
        onAdd({...base,id:uid(),type:'movie',category:'favorite',title,favorite:true,genre:movieGenre,streaming:[],streamingNote:''});
      }else{
        const cat=sel?.date&&sel.date>=TODAY()?'comingSoon':'released';
        onAdd({...base,id:uid(),type:'movie',category:cat,title});
      }
    }else{
      const sk=sel?.tmdbId?showKey(sel.tmdbId):null;
      if(tvCat==='favorite'){
        let tvUpd={};
        if(sel?.tmdbId){
          const dets=await fetchTVDetails(sel.tmdbId);
          if(dets) tvUpd=buildTVDisplay(dets,'favorite');
        }
        onAdd({...base,id:uid(),type:'tv',category:'favorite',title,
          showKey:sk,tvDetailsFetched:true,favorite:true,...tvUpd});
      }else if(tvCat==='comingSoon'){
        // Ongoing — data already fetched in selectResult
        onAdd({...base,id:uid(),type:'tv',category:'comingSoon',title,
          showKey:sk,tvDetailsFetched:!!tvDets,
          totalSeasons:tvSeasons||null,
          watchedSeasons:Array.from(watchedSeasons),
          tmdbDate:tvDets?.currentSeason?.date||sel?.date||'',
          firstAirDate:tvDets?.firstAirDate||'',
          newSeasonAnnounced:newSznOn,
          newSeasonDate:newSznOn?(newSznDate||''):'',
        });
      }else{
        // Start or Rewatch — fetch details now
        let tvUpd={};
        if(sel?.tmdbId){
          const dets=await fetchTVDetails(sel.tmdbId);
          if(dets) tvUpd=buildTVDisplay(dets,tvCat==='rewatch'?'rewatch':'released');
        }
        onAdd({...base,id:uid(),type:'tv',
          category:tvCat==='rewatch'?'rewatch':'released',
          title,showKey:sk,tvDetailsFetched:true,...tvUpd});
      }
    }
    setAdding(false);onClose();
  };

  const isTV=mtype==='tv';
  const isOngoing=isTV&&tvCat==='comingSoon';

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="dm-drag"/>
        <div className="modal-title">Add to Watchlist</div>

        {/* Movie / TV segmented */}
        <div className="intent-toggle" style={{marginBottom:12}}>
          <button className={`intent-btn${mtype==='movie'?' on':''}`} onClick={()=>{setMtype('movie');setResults([]);setSel(null);resetTV();}}>🎬 Movie</button>
          <button className={`intent-btn${mtype==='tv'?' on':''}`} onClick={()=>{setMtype('tv');setResults([]);setSel(null);resetTV();}}>📺 TV Show</button>
        </div>

        {/* Category */}
        {isTV?(
          <div className="intent-toggle" style={{marginBottom:12}}>
            {[['released','Start'],['comingSoon','Ongoing'],['rewatch','Rewatch'],['favorite','⭐ Favorite']].map(([k,l])=>(
              <button key={k} className={`intent-btn${tvCat===k?' on':''}`} onClick={()=>{setTvCat(k);setSel(null);resetTV();}}>{l}</button>
            ))}
          </div>
        ):(
          <>
            <div className="intent-toggle" style={{marginBottom:12}}>
              <button className={`intent-btn${movieIntent==='watch'?' on':''}`} onClick={()=>setMovieIntent('watch')}>Want to Watch</button>
              <button className={`intent-btn${movieIntent==='rewatch'?' on':''}`} onClick={()=>setMovieIntent('rewatch')}>Rewatch</button>
              <button className={`intent-btn${movieIntent==='favorite'?' on':''}`} onClick={()=>setMovieIntent('favorite')}>⭐ Favorite</button>
            </div>
            {movieIntent==='favorite'&&(
              <select className="msel" style={{marginBottom:12}} value={movieGenre} onChange={e=>setMovieGenre(e.target.value)}>
                <option value="">Genre — optional</option>
                {GENRES.map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            )}
          </>
        )}

        <div className="row2" style={{marginBottom:12}}>
          <input ref={ref} className="minput" style={{marginBottom:0,flex:1}} placeholder="Search title…"
            value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()}/>
          <button className="btn btn-gold" onClick={doSearch} style={{flexShrink:0}}>
            {loading?<span className="spinner"/>:'Search'}
          </button>
        </div>

        {results.length>0&&(
          <div className="results">
            {results.map(r=>(
              <div key={r.tmdbId} className={`ritem${sel?.tmdbId===r.tmdbId?' sel':''}`} onClick={()=>selectResult(r)}>
                {r.poster?<img className="rposter" src={r.poster} alt={r.title}/>:<div className="rposter" style={{display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text2)',height:72}}>?</div>}
                <div className="rinfo">
                  <div className="rtitle">{r.title}</div>
                  {r.year&&<div className="ryear">{r.year}</div>}
                  <div className="rdesc">{r.description}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Ongoing panel */}
        {isOngoing&&sel&&(
          <div className="tv-sp">
            <div className="tv-sp-title">Seasons watched</div>
            {tvFetching?(
              <div style={{color:'var(--text2)',fontSize:13,display:'flex',alignItems:'center',gap:8}}>Loading season info <span className="spinner"/></div>
            ):tvSeasons>0?(
              <>
                <button className={`season-cb-all${watchedSeasons.size===tvSeasons?' on':''}`} onClick={toggleAll}>
                  {watchedSeasons.size===tvSeasons?'✓ All seasons':'Select all'}
                </button>
                <div className="season-grid">
                  {Array.from({length:tvSeasons},(_,i)=>i+1).map(s=>(
                    <button key={s} className={`season-cb${watchedSeasons.has(s)?' on':''}`} onClick={()=>toggleSeason(s)}>
                      {watchedSeasons.has(s)?'✓ ':''} S{s}
                    </button>
                  ))}
                </div>
              </>
            ):(
              <div style={{color:'var(--text2)',fontSize:13}}>No season info found</div>
            )}
            <div className={`nsz-toggle${newSznOn?' on':''}`} style={{marginBottom:0}} onClick={()=>setNewSznOn(v=>!v)}>
              <span className={`nsz-check${newSznOn?' on':''}`}>{newSznOn?'✓':'○'}</span>
              <div className="nsz-text">
                <div className="nsz-label">New season announced</div>
                {newSznOn&&newSznDate&&<div className="nsz-date">{parseDate(newSznDate)?.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})||newSznDate}</div>}
              </div>
            </div>
          </div>
        )}

        <input className="minput" placeholder="Streaming service (optional — auto-detected)" value={svc} onChange={e=>setSvc(e.target.value)}/>
        <input className="minput" style={{marginBottom:0}} placeholder="Price note (e.g. $5.99)" value={sNote} onChange={e=>setSNote(e.target.value)}/>
        <div className="mactions">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-gold" onClick={handleAdd} disabled={adding||tvFetching}>
            {adding?<span className="spinner"/>:sel?`Add "${sel.title.slice(0,22)}${sel.title.length>22?'…':''}"` :'Add Item'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── APP ── */
function App(){
  const[items,setItems]=useState(()=>{
    const merge=(base,extra)=>{
      const seen=new Set(base.map(i=>`${i.type}:${i.title.toLowerCase()}`));
      return[...base,...extra.filter(f=>!seen.has(`${f.type}:${f.title.toLowerCase()}`))];
    };
    try{
      const s7=localStorage.getItem('watchlist-v7');
      if(s7)return autoMove(JSON.parse(s7));
      const s6=localStorage.getItem('watchlist-v6');
      if(s6)return autoMove(merge(JSON.parse(s6),FAVS_DATA));
      const s5=localStorage.getItem('watchlist-v5');
      if(s5)return autoMove(merge(JSON.parse(s5).map(i=>({favorite:false,genre:'',isCrown:false,bestPictureYear:null,...i})),FAVS_DATA));
    }catch{}
    return autoMove([...DATA,...FAVS_DATA]);
  });
  const[tab,setTab]=useState('movie');
  const[section,setSection]=useState('comingSoon');
  const[showAdd,setShowAdd]=useState(false);
  const[detail,setDetail]=useState(null);
  const[favDetail,setFavDetail]=useState(null);
  const[done,setDone]=useState(0);
  const[total,setTotal]=useState(0);
  const[fetching,setFetching]=useState(false);

  useEffect(()=>{
    try{localStorage.setItem('watchlist-v7',JSON.stringify(items));}catch{}
  },[items]);

  useEffect(()=>{
    const needBasic=items.filter(i=>!i.tmdbFetched);
    const needTV=items.filter(i=>i.type==='tv'&&i.tmdbFetched&&!i.tvDetailsFetched&&i.tmdbId);
    const tot=needBasic.length+needTV.length;
    if(!tot)return;
    setFetching(true);setTotal(tot);setDone(0);

    const applyUpdate=(id,upd)=>{
      setItems(prev=>{
        const idx=prev.findIndex(x=>x.id===id);
        if(idx===-1)return prev;
        const next=[...prev];
        next[idx]={...next[idx],...upd};
        return next;
      });
    };

    const basicTasks=needBasic.map(item=>async()=>{
      const upd=await fetchItem(item);
      applyUpdate(item.id,upd);
      setDone(n=>n+1);
    });

    const tvTasks=needTV.map(item=>async()=>{
      const dets=await fetchTVDetails(item.tmdbId);
      const upd=applyTVDets(item,dets);
      applyUpdate(item.id,upd);
      setDone(n=>n+1);
    });

    runQ([...basicTasks,...tvTasks],5)
      .finally(()=>{setFetching(false);setItems(prev=>autoMove(prev));});
  },[]);// eslint-disable-line

  const removeItem=useCallback(id=>{
    setItems(p=>p.filter(i=>i.id!==id));
    setDetail(null);
  },[]);

  const updateItem=useCallback((id,upd)=>{
    setItems(p=>p.map(i=>i.id===id?{...i,...upd}:i));
    setDetail(prev=>prev&&prev.id===id?{...prev,...upd}:prev);
  },[]);

  const addItem=useCallback(item=>setItems(p=>[...p,item]),[]);

  const exportJSON=()=>{
    const b=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');a.href=u;a.download='watchlist.json';a.click();
    URL.revokeObjectURL(u);
  };

  const counts=useMemo(()=>{
    const mv=items.filter(i=>i.type==='movie');
    const tv=items.filter(i=>i.type==='tv');
    const sc=arr=>({
      released:arr.filter(i=>i.category==='released').length,
      comingSoon:arr.filter(i=>i.category==='comingSoon').length,
      rewatch:arr.filter(i=>i.category==='rewatch').length,
      favorites:arr.filter(i=>i.favorite).length,
    });
    return{movie:{total:mv.length,...sc(mv)},tv:{total:tv.length,...sc(tv)}};
  },[items]);

  const visible=useMemo(()=>sortedItems(items.filter(i=>i.type===tab&&i.category===section),section),[items,tab,section]);

  const switchTab=t=>{setTab(t);setSection(s=>s==='favorites'?'favorites':(t==='movie'?'comingSoon':'released'));};

  const pct=total>0?(done/total)*100:100;
  const tc=counts[tab];
  const SECTIONS=tab==='movie'
    ?[['comingSoon','Coming Soon',tc.comingSoon],['released','Released',tc.released],['rewatch','Rewatch',tc.rewatch],['favorites','Favorites',tc.favorites]]
    :[['released','Start',tc.released],['comingSoon','Ongoing',tc.comingSoon],['rewatch','Rewatch',tc.rewatch],['favorites','Favorites',tc.favorites]];

  return(
    <>
      <div className="hdr">
        <div className="hdr-top">
          <div className="hdr-title">
            🍿 Watchlist
            {fetching&&<small>{done}/{total}</small>}
          </div>
          <div className="hdr-btns">
            <button className="btn btn-gold" onClick={()=>setShowAdd(true)}>＋ Add</button>
          </div>
        </div>
        {fetching&&(
          <div className="prog-wrap">
            <div className="prog-label">Fetching posters &amp; streaming info… {done}/{total}</div>
            <div className="prog-track"><div className="prog-fill" style={{width:`${pct}%`}}/></div>
          </div>
        )}
        <div className="tabs">
          <button className={`tab${tab==='movie'?' on':''}`} onClick={()=>switchTab('movie')}>Movies</button>
          <button className={`tab${tab==='tv'?' on':''}`} onClick={()=>switchTab('tv')}>TV Shows</button>
        </div>
        <div className="seg-wrap">
          <div className="seg">
            {SECTIONS.map(([key,label,cnt])=>(
              <button key={key} className={`seg-btn${section===key?' on':''}`} onClick={()=>setSection(key)}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="main">
        {section==='favorites'?(
          <FavoritesView items={items} tab={tab} onTap={it=>{setFavDetail(it);setDetail(null);}}/>
        ):(
          <>
            {!visible.length&&<div className="empty">Nothing here yet — tap ＋ Add to get started</div>}
            <div className="grid">
              {visible.map(it=><Card key={it.id} item={it} onTap={setDetail}/>)}
            </div>
          </>
        )}
      </div>

      {detail&&(
        <DetailModal
          item={detail}
          onClose={()=>setDetail(null)}
          onWatched={removeItem}
          onRemove={removeItem}
          onUpdateItem={updateItem}
        />
      )}
      {favDetail&&(
        <FavoriteDetailModal
          item={favDetail}
          onClose={()=>setFavDetail(null)}
          onRemove={id=>{removeItem(id);setFavDetail(null);}}
          onUpdateItem={(id,upd)=>{updateItem(id,upd);setFavDetail(prev=>prev&&prev.id===id?{...prev,...upd}:prev);}}
        />
      )}
      {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={addItem}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
