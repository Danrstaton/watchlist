/* ── TMDB API ── */
async function tmdbSearch(title,type){
  const q=title.replace(/\s*\(.*?\)/g,'').replace(/:\s*(season|s)\s*\d+/i,'').trim();
  try{
    const r=await fetch(
      `https://api.themoviedb.org/3/search/${type==='movie'?'movie':'tv'}?query=${encodeURIComponent(q)}&language=en-US&page=1`,
      {headers:{'Authorization':`Bearer ${TOKEN}`}}
    );
    if(!r.ok)return[];
    const d=await r.json();
    return(d.results||[]).slice(0,6).map(x=>({
      tmdbId:x.id,title:x.title||x.name||'',
      year:(x.release_date||x.first_air_date||'').slice(0,4),
      date:x.release_date||x.first_air_date||'',
      poster:x.poster_path?`${IMG}${x.poster_path}`:null,
      description:x.overview||'',
    }));
  }catch{return[];}
}

async function getProviders(tmdbId,type){
  try{
    const r=await fetch(
      `https://api.themoviedb.org/3/${type==='movie'?'movie':'tv'}/${tmdbId}/watch/providers`,
      {headers:{'Authorization':`Bearer ${TOKEN}`}}
    );
    if(!r.ok)return[];
    const d=await r.json();
    const us=d.results?.US;
    if(!us)return[];
    const all=[...(us.flatrate||[]),...(us.free||[])];
    return[...new Set(all.map(p=>PMAP[p.provider_name]).filter(Boolean))];
  }catch{return[];}
}

async function fetchTVDetails(tmdbId){
  try{
    const r=await fetch(`https://api.themoviedb.org/3/tv/${tmdbId}`,{headers:{'Authorization':`Bearer ${TOKEN}`}});
    if(!r.ok)return null;
    const d=await r.json();
    const next=d.next_episode_to_air;
    const last=d.last_episode_to_air;
    const isNewSeason=next&&last&&next.season_number>last.season_number;
    return{
      currentSeason:last?{date:last.air_date,season:last.season_number}:null,
      upcomingSeason:isNewSeason?{date:next.air_date,season:next.season_number}:null,
      totalSeasons:d.number_of_seasons||1,
      releasedSeasons:last?last.season_number:(d.number_of_seasons||1),
      firstAirDate:d.first_air_date||'',
    };
  }catch{return null;}
}

function buildTVDisplay(dets,cat){
  // Returns {seasonNote,yearRange,totalSeasons,firstAirDate,tmdbDate}
  const{currentSeason:cur,upcomingSeason:upc,totalSeasons,releasedSeasons,firstAirDate:fa}=dets;
  const startYear=(fa||'').slice(0,4);
  const endYear=cur?.date?.slice(0,4)||startYear;
  const yr=startYear&&endYear&&startYear!==endYear?`${startYear}–${endYear}`:startYear;
  if(cat==='rewatch'){
    const n=totalSeasons||1;
    return{seasonNote:n>1?`Season 1–${n}`:'Season 1',yearRange:yr,totalSeasons:n,firstAirDate:fa||'',tmdbDate:cur?.date||''};
  }
  if(cat==='released'){
    const n=releasedSeasons||totalSeasons||null;
    return{seasonNote:n>1?`Season 1–${n}`:(n===1?'Season 1':''),yearRange:yr,totalSeasons:n,firstAirDate:fa||'',tmdbDate:cur?.date||''};
  }
  // comingSoon (Ongoing)
  return{totalSeasons:releasedSeasons||totalSeasons||null,firstAirDate:fa||'',tmdbDate:cur?.date||'',newSeasonDate:upc?.date||''};
}

function applyTVDets(item,dets){
  if(!dets)return{tvDetailsFetched:true};
  const sk=item.tmdbId?showKey(item.tmdbId):null;
  const built=buildTVDisplay(dets,item.category);
  return{tvDetailsFetched:true,showKey:sk,...built};
}

async function fetchItem(item){
  const results=await tmdbSearch(item.title,item.type);
  // For comingSoon prefer a result with a future release date
  let r=null;
  if(item.category==='comingSoon'&&results.length>1){
    r=results.find(x=>x.date&&x.date>=TODAY())||results[0];
  }else{
    r=results[0]||null;
  }
  if(!r)return{tmdbFetched:true,tvDetailsFetched:item.type==='tv'};
  const update={poster:r.poster,description:r.description,tmdbDate:r.date,tmdbId:r.tmdbId,tmdbFetched:true};
  // Auto-fetch streaming only when user hasn't specified any
  if(!item.streaming||!item.streaming.length){
    const pvs=await getProviders(r.tmdbId,item.type);
    if(pvs.length)update.streaming=pvs;
  }
  if(item.type==='tv'){
    const dets=await fetchTVDetails(r.tmdbId);
    const tvUpd=applyTVDets({...item,...update},dets);
    Object.assign(update,tvUpd);
  }
  return update;
}

async function runQ(tasks,limit){
  if(!tasks.length)return;
  return new Promise(res=>{
    const q=[...tasks];let active=0;
    function next(){
      while(active<limit&&q.length){
        const t=q.shift();active++;
        Promise.resolve(t()).finally(()=>{active--;next();if(!active&&!q.length)res();});
      }
      if(!active&&!q.length)res();
    }
    next();
  });
}

/* ── DATE UTILS ── */
function parseDate(s){
  if(!s)return null;
  s=s.trim();
  if(!s||s==='TBD'||s==='?')return null;
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return new Date(s+'T00:00:00');
  const a=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
  if(a)return new Date(2000+~~a[3],~~a[1]-1,~~a[2]);
  const b=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(b)return new Date(~~b[3],~~b[1]-1,~~b[2]);
  const c=s.match(/^([A-Za-z]+)\s+(\d{4})$/);
  if(c){const M={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    const m=M[c[1].toLowerCase().slice(0,3)];if(m!=null)return new Date(~~c[2],m,1);}
  return null;
}

function autoMove(items){
  const now=Date.now(),DAYS=45;
  return items.map(i=>{
    if(i.category!=='comingSoon')return i;
    const d=parseDate(i.tmdbDate)||parseDate(i.userDate);
    if(!d||d.getTime()>now)return i;
    return{...i,category:'released',inTheaters:(now-d.getTime())/86400000<=DAYS};
  });
}

function formatDate(item){
  if(item.yearRange)return item.yearRange;
  const d=parseDate(item.tmdbDate)||parseDate(item.userDate);
  if(!d){
    if(item.userDate&&/^\d{4}$/.test(item.userDate.trim()))return item.userDate.trim();
    if(item.category==='comingSoon')return'TBD';
    return'';
  }
  if(item.category==='comingSoon'||item.inTheaters)
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  return String(d.getFullYear());
}

function sortedItems(arr,sec){
  const ms=i=>{const d=parseDate(i.tmdbDate)||parseDate(i.userDate);return d?d.getTime():null;};
  return[...arr].sort((a,b)=>{
    const da=ms(a),db=ms(b);
    if(da==null&&db==null)return 0;
    if(da==null)return 1;if(db==null)return-1;
    return sec==='comingSoon'?da-db:db-da;
  });
}

function Card({item,onTap}){
  const isOngoing=item.type==='tv'&&item.category==='comingSoon';

  // Season / status line
  let seasonLine='';
  if(isOngoing){
    if(item.newSeasonAnnounced){
      const d=item.newSeasonDate?parseDate(item.newSeasonDate):null;
      const ds=d?d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
      seasonLine=`New season coming${ds?` · ${ds}`:''}`;
    }else{
      const w=item.watchedSeasons?.length||0,t=item.totalSeasons||0;
      seasonLine=t>0?(w>0?`${w}/${t} seasons watched`:`${t} seasons`):'';
    }
  }else{
    seasonLine=item.seasonNote||'';
  }

  // Date line — hide for Ongoing (info already in seasonLine)
  const dateStr=isOngoing?'':formatDate(item);

  return(
    <div className="card" onClick={()=>onTap(item)}>
      <div className="poster">
        {item.poster
          ?<img src={item.poster} alt={item.title} loading="lazy"/>

        }
      </div>
      <div className="cbody">
        <div className="ctitle">{item.title}</div>
        {seasonLine&&<div className="cseason">{seasonLine}</div>}
        {dateStr&&<div className="cdate">{dateStr}</div>}
        {(item.inTheaters||item.streaming?.length>0)&&(
          <div className="badges">
            {item.inTheaters&&<span className="badge" style={{background:'linear-gradient(135deg,#b52a2a,#e03c3c)',color:'#fff'}}>🎬 In Theaters</span>}
            {item.streaming&&item.streaming.map(s=><Badge key={s} svc={s} note={item.streamingNote}/>)}

      </div>
    </div>
  );
}

function DetailModal({item,onClose,onWatched,onRemove,onUpdateItem}){
  const[watched,setWatched]=React.useState(new Set(item.watchedSeasons||[]));
  const[newSznOn,setNewSznOn]=React.useState(item.newSeasonAnnounced||false);
  const[newSznDate,setNewSznDate]=React.useState(item.newSeasonDate||'');
  const[moving,setMoving]=React.useState(false);
  const[sznFetching,setSznFetching]=React.useState(false);

  const isTV=item.type==='tv';
  const isStart=isTV&&item.category==='released';
  const isOngoing=isTV&&item.category==='comingSoon';
  const isMovie=item.type==='movie';

  // Hero meta line
  let heroSub='';
  if(isOngoing){
    if(newSznOn){
      const d=newSznDate?parseDate(newSznDate):null;
      const ds=d?d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
      heroSub=`New season coming${ds?` · ${ds}`:''}`;
    }else{
      const w=watched.size,t=item.totalSeasons||0;
      heroSub=t>0?(w>0?`${w}/${t} seasons watched`:`${t} seasons`):'';
    }
  }else{
    heroSub=item.seasonNote||'';
  }
  const showDate=!isOngoing;
  const date=showDate?formatDate(item):'';

  const toggleSeason=s=>{
    setWatched(prev=>{
      const n=new Set(prev);n.has(s)?n.delete(s):n.add(s);
      onUpdateItem(item.id,{watchedSeasons:Array.from(n)});
      return n;
    });
  };
  const toggleAll=()=>{
    const n=watched.size===item.totalSeasons?new Set():new Set(Array.from({length:item.totalSeasons},(_,i)=>i+1));
    setWatched(n);onUpdateItem(item.id,{watchedSeasons:Array.from(n)});
  };

  const handleNewSzn=async checked=>{
    setNewSznOn(checked);
    if(checked){
      let d=item.newSeasonDate||'';
      if(!d&&item.tmdbId){
        setSznFetching(true);
        const dets=await fetchTVDetails(item.tmdbId);
        d=dets?.upcomingSeason?.date||'';
        setSznFetching(false);
      }
      setNewSznDate(d);
      onUpdateItem(item.id,{newSeasonAnnounced:true,newSeasonDate:d});
    }else{
      onUpdateItem(item.id,{newSeasonAnnounced:false});
    }
  };

  const handleMoveToOngoing=async()=>{
    setMoving(true);
    const upd={category:'comingSoon',watchedSeasons:item.watchedSeasons||[]};
    if(item.tmdbId){
      const dets=await fetchTVDetails(item.tmdbId);
      if(dets){
        Object.assign(upd,{
          totalSeasons:dets.releasedSeasons||dets.totalSeasons||null,
          newSeasonDate:dets.upcomingSeason?.date||'',
          tmdbDate:dets.currentSeason?.date||item.tmdbDate,
          firstAirDate:dets.firstAirDate||item.firstAirDate||'',
          tvDetailsFetched:true,
        });
      }
    }
    onUpdateItem(item.id,upd);setMoving(false);onClose();
  };

  const handleMoveToRewatch=async()=>{
    setMoving(true);
    const upd={category:'rewatch',newSeasonAnnounced:false,newSeasonDate:'',watchedSeasons:[]};
    if(item.tmdbId){
      const dets=await fetchTVDetails(item.tmdbId);
      if(dets) Object.assign(upd,{tvDetailsFetched:true,...buildTVDisplay(dets,'rewatch')});
    }
    onUpdateItem(item.id,upd);setMoving(false);onClose();
  };

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{padding:0}}>
        <div className="dm-hero-wrap">
          {item.poster?<img className="dm-hero-img" src={item.poster} alt={item.title}/>:<div className="dm-hero-ph">🍿</div>}
          <div className="dm-hero-scrim"/>
          <div className="dm-hero-drag"/>
          <div className="dm-hero-info">
            <div className="dm-hero-title">{item.title}</div>
            <div className="dm-hero-meta">
              {heroSub&&<span style={{color:'rgba(255,255,255,.8)',fontSize:12}}>{heroSub}</span>}
              {date&&<span style={{color:'var(--accent)',fontSize:13,fontWeight:600}}>{date}</span>}
              {item.inTheaters&&<span className="badge" style={{background:'linear-gradient(135deg,#b52a2a,#e03c3c)',color:'#fff'}}>🎬 In Theaters</span>}
              {item.streaming&&item.streaming.map(s=><Badge key={s} svc={s} note={item.streamingNote}/>)}
            </div>
          </div>
        </div>
        <div className="dm-content">
          {item.description&&<p className="dm-desc">{item.description}</p>}

          {isOngoing&&item.totalSeasons>0&&(
            <div>
              <div className="season-label">Seasons watched</div>
              <button className={`season-cb-all${watched.size===item.totalSeasons?' on':''}`} onClick={toggleAll}>
                {watched.size===item.totalSeasons?'✓ All seasons':'Select all seasons'}
              </button>
              <div className="season-grid">
                {Array.from({length:item.totalSeasons},(_,i)=>i+1).map(s=>(
                  <button key={s} className={`season-cb${watched.has(s)?' on':''}`} onClick={()=>toggleSeason(s)}>
                    {watched.has(s)?'✓ ':''} S{s}
                  </button>
                ))}
              </div>
            </div>
          )}

          {isOngoing&&(
            <div className={`nsz-toggle${newSznOn?' on':''}`} onClick={()=>!sznFetching&&handleNewSzn(!newSznOn)}>
              <span className={`nsz-check${newSznOn?' on':''}`}>
                {sznFetching?<span className="spinner"/>:(newSznOn?'✓':'○')}
              </span>
              <div className="nsz-text">
                <div className="nsz-label">New season announced</div>
                {newSznOn&&newSznDate&&(
                  <div className="nsz-date">
                    {parseDate(newSznDate)?.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})||newSznDate}
                  </div>
                )}
              </div>
            </div>
          )}

          <div className="dm-actions">
            <button className="btn" onClick={onClose}>Close</button>
            <button className="btn btn-danger" onClick={()=>{onRemove(item.id);onClose();}}>Remove</button>
            {isStart&&(
              <button className="move-btn" onClick={handleMoveToOngoing} disabled={moving}>
                {moving?<span className="spinner"/>:'Move to Ongoing →'}
              </button>
            )}
            {isOngoing&&(
              <button className="move-btn" onClick={handleMoveToRewatch} disabled={moving}>
                {moving?<span className="spinner"/>:'Move to Rewatch →'}
              </button>
            )}
            {isMovie&&item.category!=='comingSoon'&&(
              <button className="btn btn-watched" onClick={()=>{onWatched(item.id);onClose();}}>✓ Watched</button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

                  ))}
                </div>
              </>
            ):(
              <div style={{color:'var(--text2)',fontSize:13}}>No season info found</div>
            )}
            <div className={`nsz-toggle${newSznOn?' on':''}`} style={{marginBottom:0}} onClick={()=>setNewSznOn(v=>!v)}>
              <span className={`nsz-check${newSznOn?' on':''}`}>{newSznOn?'✓':'○'}</span>
              <div className="nsz-text">
                <div className="nsz-label">New season announced</div>
                {newSznOn&&newSznDate&&<div className="nsz-date">{parseDate(newSznDate)?.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})||newSznDate}</div>}
              </div>
            </div>
          </div>
        )}

        <input className="minput" placeholder="Streaming service (optional — auto-detected)" value={svc} onChange={e=>setSvc(e.target.value)}/>
        <input className="minput" style={{marginBottom:0}} placeholder="Price note (e.g. $5.99)" value={sNote} onChange={e=>setSNote(e.target.value)}/>
        <div className="mactions">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-gold" onClick={handleAdd} disabled={adding||tvFetching}>
            {adding?<span className="spinner"/>:sel?`Add "${sel.title.slice(0,22)}${sel.title.length>22?'…':''}"` :'Add Item'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── APP ── */
function App(){
  const[items,setItems]=useState(()=>{
    try{
      const s=localStorage.getItem('watchlist-v5');
      if(s)return autoMove(JSON.parse(s));
    }catch{}
    return autoMove(DATA);
  });
  const[tab,setTab]=useState('movie');
  const[section,setSection]=useState('comingSoon');
  const[showAdd,setShowAdd]=useState(false);
  const[detail,setDetail]=useState(null);
  const[done,setDone]=useState(0);
  const[total,setTotal]=useState(0);
  const[fetching,setFetching]=useState(false);

  useEffect(()=>{
    try{localStorage.setItem('watchlist-v5',JSON.stringify(items));}catch{}
  },[items]);

  useEffect(()=>{
    const needBasic=items.filter(i=>!i.tmdbFetched);
    const needTV=items.filter(i=>i.type==='tv'&&i.tmdbFetched&&!i.tvDetailsFetched&&i.tmdbId);
    const tot=needBasic.length+needTV.length;
    if(!tot)return;
    setFetching(true);setTotal(tot);setDone(0);

    const applyUpdate=(id,upd)=>{
      setItems(prev=>{
        const idx=prev.findIndex(x=>x.id===id);
        if(idx===-1)return prev;
        const next=[...prev];
        next[idx]={...next[idx],...upd};
        return next;
      });
    };

    const basicTasks=needBasic.map(item=>async()=>{
      const upd=await fetchItem(item);
      applyUpdate(item.id,upd);
      setDone(n=>n+1);
    });

    const tvTasks=needTV.map(item=>async()=>{
      const dets=await fetchTVDetails(item.tmdbId);
      const upd=applyTVDets(item,dets);
      applyUpdate(item.id,upd);
      setDone(n=>n+1);
    });

    runQ([...basicTasks,...tvTasks],5)
      .finally(()=>{setFetching(false);setItems(prev=>autoMove(prev));});
  },[]);// eslint-disable-line

  const removeItem=useCallback(id=>{
    setItems(p=>p.filter(i=>i.id!==id));
    setDetail(null);
  },[]);

  const updateItem=useCallback((id,upd)=>{
    setItems(p=>p.map(i=>i.id===id?{...i,...upd}:i));
    setDetail(prev=>prev&&prev.id===id?{...prev,...upd}:prev);
  },[]);

  const addItem=useCallback(item=>setItems(p=>[...p,item]),[]);

  const exportJSON=()=>{
    const b=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');a.href=u;a.download='watchlist.json';a.click();
    URL.revokeObjectURL(u);
  };

  const counts=useMemo(()=>{
    const mv=items.filter(i=>i.type==='movie');
    const tv=items.filter(i=>i.type==='tv');
    const sc=arr=>({
      released:arr.filter(i=>i.category==='released').length,
      comingSoon:arr.filter(i=>i.category==='comingSoon').length,
      rewatch:arr.filter(i=>i.category==='rewatch').length,
    });
    return{movie:{total:mv.length,...sc(mv)},tv:{total:tv.length,...sc(tv)}};
  },[items]);

  const visible=useMemo(()=>sortedItems(items.filter(i=>i.type===tab&&i.category===section),section),[items,tab,section]);

  const switchTab=t=>{setTab(t);setSection(t==='movie'?'comingSoon':'released');};

  const pct=total>0?(done/total)*100:100;
  const tc=counts[tab];
  const SECTIONS=tab==='movie'
    ?[['comingSoon','Coming Soon',tc.comingSoon],['released','Released',tc.released],['rewatch','Rewatch',tc.rewatch]]
    :[['released','Start',tc.released],['comingSoon','Ongoing',tc.comingSoon],['rewatch','Rewatch',tc.rewatch]];

  return(
    <>
      <div className="hdr">
        <div className="hdr-top">
          <div className="hdr-title">
            🍿 Watchlist
            <small>{items.length} titles{fetching?` · ${done}/${total}`:''}</small>
          </div>
          <div className="hdr-btns">
            <button className="btn" onClick={exportJSON}>⬇ JSON</button>
            <button className="btn btn-gold" onClick={()=>setShowAdd(true)}>＋ Add</button>
          </div>
        </div>
        {fetching&&(
          <div className="prog-wrap">
            <div className="prog-label">Fetching posters &amp; streaming info… {done}/{total}</div>
            <div className="prog-track"><div className="prog-fill" style={{width:`${pct}%`}}/></div>
          </div>
        )}
        <div className="tabs">
          <button className={`tab${tab==='movie'?' on':''}`} onClick={()=>switchTab('movie')}>
            Movies ({counts.movie.total})
          </button>
          <button className={`tab${tab==='tv'?' on':''}`} onClick={()=>switchTab('tv')}>
            TV Shows ({counts.tv.total})
          </button>
        </div>
        <div className="seg-wrap">
          <div className="seg">
            {SECTIONS.map(([key,label,cnt])=>(
              <button key={key} className={`seg-btn${section===key?' on':''}`} onClick={()=>setSection(key)}>
                {label}<span className="seg-cnt">{cnt}</span>
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="main">
        {!visible.length&&<div className="empty">Nothing here yet — tap ＋ Add to get started</div>}
        <div className="grid">
          {visible.map(it=><Card key={it.id} item={it} onTap={setDetail}/>)}
        </div>
      </div>

      {detail&&(
        <DetailModal
          item={detail}
          onClose={()=>setDetail(null)}
          onWatched={removeItem}
          onRemove={removeItem}
          onUpdateItem={updateItem}
        />
      )}
      {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={addItem}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
