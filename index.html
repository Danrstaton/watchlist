<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watchlist</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
:root {
  --bg: #0d0d16;
  --bg2: #13131f;
  --card: #18182a;
  --card2: #1f1f35;
  --border: rgba(255,255,255,0.07);
  --text: #e8e8f2;
  --text2: #8888aa;
  --accent: #e5b25d;
  --accent2: #c4891a;
  --red: #e54b4b;
  --radius: 10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.hdr{background:linear-gradient(180deg,#1c1530 0%,#0d0d16 100%);border-bottom:1px solid var(--border);padding:12px 14px 0;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.6)}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.hdr-title{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-.5px;white-space:nowrap}
.hdr-title small{color:var(--text2);font-size:11px;font-weight:400;margin-left:8px;white-space:nowrap}
.search{flex:1;min-width:120px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:var(--text2)}
.hdr-btns{display:flex;gap:7px;flex-shrink:0}
.btn{background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:13px;padding:7px 12px;transition:background .2s;white-space:nowrap}
.btn:hover{background:rgba(255,255,255,.14)}
.btn-gold{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.btn-gold:hover{background:var(--accent2);border-color:var(--accent2)}
.prog-wrap{margin-bottom:10px}
.prog-label{color:var(--text2);font-size:11px;margin-bottom:4px}
.prog-track{background:rgba(255,255,255,.06);border-radius:3px;height:3px;overflow:hidden}
.prog-fill{background:var(--accent);height:100%;transition:width .3s}
.tabs{display:flex}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);cursor:pointer;font-size:14px;font-weight:600;padding:10px 18px;transition:color .2s,border-color .2s}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.on){color:var(--text)}

/* ── MAIN ── */
.main{padding:14px}

/* ── SECTION ── */
.sec{margin-bottom:28px}
.sec-hdr{align-items:center;background:none;border:none;border-bottom:1px solid var(--border);color:var(--text);cursor:pointer;display:flex;font-size:11px;font-weight:700;gap:8px;letter-spacing:1px;padding:11px 0;text-align:left;text-transform:uppercase;width:100%}
.sec-cnt{background:rgba(255,255,255,.09);border-radius:10px;color:var(--text2);font-size:10px;padding:1px 7px}
.chev{color:var(--text2);margin-left:auto;transition:transform .2s;font-size:16px;line-height:1}
.chev.open{transform:rotate(90deg)}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;padding-top:12px}
@media(min-width:500px){.grid{grid-template-columns:repeat(3,1fr)}}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.65)}
.poster{aspect-ratio:2/3;background:var(--card2);overflow:hidden;position:relative}
.poster img{height:100%;object-fit:cover;width:100%;display:block}
.poster-ph{align-items:center;color:var(--text2);display:flex;flex-direction:column;font-size:10px;gap:5px;height:100%;justify-content:center;padding:8px;text-align:center}
.poster-ph svg{opacity:.25}
.del-btn{background:rgba(0,0,0,.72);border:none;border-radius:50%;color:#ccc;cursor:pointer;display:none;font-size:13px;height:24px;line-height:1;padding:0;position:absolute;right:6px;top:6px;width:24px;align-items:center;justify-content:center;transition:background .15s}
.card:hover .del-btn{display:flex}
.del-btn:hover{background:var(--red);color:#fff}
@media(hover:none){.del-btn{display:flex}}
.cbody{padding:8px}
.ctitle{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cdate{color:var(--accent);font-size:11px;font-weight:500;margin-bottom:3px}
.cnote{color:var(--text2);font-size:10px;font-style:italic;margin-bottom:3px}
.badges{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.badge{border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.3px;padding:2px 5px;white-space:nowrap}
.cdesc{color:var(--text2);font-size:10px;line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}

/* ── MODAL ── */
.overlay{align-items:center;background:rgba(0,0,0,.82);display:flex;inset:0;justify-content:center;padding:16px;position:fixed;z-index:200}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;max-height:85vh;max-width:480px;overflow-y:auto;padding:20px;width:100%}
.modal-title{font-size:17px;font-weight:700;margin-bottom:14px}
.row2{display:flex;gap:8px;margin-bottom:10px}
.minput{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:10px;outline:none;padding:9px 13px;width:100%;transition:border-color .2s}
.minput:focus{border-color:var(--accent)}
.msel{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px;width:100%;outline:none}
.msel option{background:var(--card)}
.results{margin-bottom:12px}
.ritem{align-items:flex-start;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;cursor:pointer;display:flex;gap:11px;margin-bottom:7px;padding:10px;transition:background .15s,border-color .15s}
.ritem:hover,.ritem.sel{background:rgba(229,178,93,.1);border-color:var(--accent)}
.rposter{background:var(--card2);border-radius:6px;flex-shrink:0;height:72px;object-fit:cover;width:48px}
.rinfo{flex:1;min-width:0}
.rtitle{font-size:13px;font-weight:600;margin-bottom:3px}
.ryear{color:var(--accent);font-size:11px;margin-bottom:3px}
.rdesc{color:var(--text2);font-size:11px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.spinner{animation:spin 1s linear infinite;border:2px solid rgba(255,255,255,.15);border-top-color:var(--accent);border-radius:50%;display:inline-block;height:15px;width:15px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{color:var(--text2);font-size:13px;padding:32px;text-align:center}
</style>

async function tmdbSearch(title,type){
  const q=title.replace(/\s*\(.*?\)/g,'').replace(/:\s*(season|s)\s*\d+/i,'').trim();
  try{
    const r=await fetch(
      `https://api.themoviedb.org/3/search/${type==='movie'?'movie':'tv'}?query=${encodeURIComponent(q)}&language=en-US&page=1`,
      {headers:{'Authorization':`Bearer ${TOKEN}`,'Content-Type':'application/json'}}
    );
    if(!r.ok)return[];
    const d=await r.json();
    return(d.results||[]).slice(0,5).map(x=>({
      tmdbId:x.id,
      title:x.title||x.name||'',
      year:(x.release_date||x.first_air_date||'').slice(0,4),
      date:x.release_date||x.first_air_date||'',
      poster:x.poster_path?`${IMG}${x.poster_path}`:null,
      description:x.overview||'',
    }));
  }catch{return[];}
}

async function runQ(tasks,limit){
  if(!tasks.length)return;
  return new Promise(res=>{
    const q=[...tasks];let active=0;
    function next(){
      while(active<limit&&q.length){
        const t=q.shift();active++;
        Promise.resolve(t()).finally(()=>{active--;next();if(!active&&!q.length)res();});
      }
      if(!active&&!q.length)res();
    }
    next();
  });
}

function Badge({svc,note}){
  const s=SVC[svc]||{bg:'#444',fg:'#fff'};
  return<span className="badge" style={{background:s.bg,color:s.fg}}>{svc}{note?` ${note}`:''}</span>;
}

function Card({item,onDelete}){
  const date=item.userDate||(item.tmdbDate?item.tmdbDate.slice(0,4):'');
  return(
    <div className="card">
      <div className="poster">
        {item.poster
          ?<img src={item.poster} alt={item.title} loading="lazy"/>
          :<div className="poster-ph">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
            </svg>
            <span>{item.title}</span>
          </div>
        }
        <button className="del-btn" onClick={()=>onDelete(item.id)}>✕</button>
      </div>
      <div className="cbody">
        <div className="ctitle">{item.title}</div>
        {date&&<div className="cdate">{date}</div>}
        {item.note&&<div className="cnote">{item.note}</div>}
        {item.streaming&&item.streaming.length>0&&(
          <div className="badges">
            {item.streaming.map(s=><Badge key={s} svc={s} note={item.streamingNote}/>)}
          </div>
        )}
        {item.description&&<div className="cdesc">{item.description}</div>}
      </div>
    </div>
  );
}

function Section({label,items,onDelete,open:initOpen=true}){
  const[open,setOpen]=useState(initOpen);
  if(!items.length)return null;
  return(
    <div className="sec">
      <button className="sec-hdr" onClick={()=>setOpen(o=>!o)}>
        {label}
        <span className="sec-cnt">{items.length}</span>
        <span className={`chev${open?' open':''}`}>›</span>
      </button>
      {open&&<div className="grid">{items.map(it=><Card key={it.id} item={it} onDelete={onDelete}/>)}</div>}
    </div>
  );
}

function AddModal({onClose,onAdd}){
  const[q,setQ]=useState('');
  const[mtype,setMtype]=useState('movie');
  const[cat,setCat]=useState('released');
  const[results,setResults]=useState([]);
  const[sel,setSel]=useState(null);
  const[loading,setLoading]=useState(false);
  const[svc,setSvc]=useState('');
  const[sNote,setSNote]=useState('');
  const[uDate,setUDate]=useState('');
  const[note,setNote]=useState('');
  const ref=useRef(null);
  useEffect(()=>{ref.current?.focus();},[]);

  const doSearch=async()=>{
    if(!q.trim())return;
    setLoading(true);setSel(null);
    const r=await tmdbSearch(q,mtype);
    setResults(r);setLoading(false);
  };

  const handleAdd=()=>{
    if(!sel&&!q.trim())return;
    onAdd({
      id:uid(),type:mtype,category:cat,
      title:sel?sel.title:q.trim(),
      streaming:svc?[svc]:[],streamingNote:sNote,
      userDate:uDate,note,
      tmdbFetched:!!sel,
      poster:sel?.poster||null,
      description:sel?.description||'',
      tmdbDate:sel?.date||'',
      tmdbId:sel?.tmdbId||null,
    });
    onClose();
  };

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-title">Add to Watchlist</div>
        <div className="row2">
          <select className="msel" value={mtype} onChange={e=>{setMtype(e.target.value);setResults([]);setSel(null);}}>
            <option value="movie">Movie</option>
            <option value="tv">TV Show</option>
          </select>
          <select className="msel" value={cat} onChange={e=>setCat(e.target.value)}>
            <option value="released">Released</option>
            <option value="comingSoon">Coming Soon</option>
            <option value="rewatch">Rewatch</option>
          </select>
        </div>
        <div className="row2" style={{marginBottom:12}}>
          <input ref={ref} className="minput" style={{marginBottom:0,flex:1}} placeholder="Search title…"
            value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()}/>
          <button className="btn btn-gold" onClick={doSearch} style={{flexShrink:0}}>
            {loading?<span className="spinner"/>:'Search'}
          </button>
        </div>
        {results.length>0&&(
          <div className="results">
            {results.map(r=>(
              <div key={r.tmdbId} className={`ritem${sel?.tmdbId===r.tmdbId?' sel':''}`} onClick={()=>setSel(r)}>
                {r.poster
                  ?<img className="rposter" src={r.poster} alt={r.title}/>
                  :<div className="rposter" style={{display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text2)'}}>?</div>
                }
                <div className="rinfo">
                  <div className="rtitle">{r.title}</div>
                  {r.year&&<div className="ryear">{r.year}</div>}
                  <div className="rdesc">{r.description}</div>
                </div>
              </div>
            ))}
          </div>
        )}
        <input className="minput" placeholder="Streaming (e.g. Netflix)" value={svc} onChange={e=>setSvc(e.target.value)}/>
        <input className="minput" placeholder="Price note (e.g. $5.99)" value={sNote} onChange={e=>setSNote(e.target.value)}/>
        <input className="minput" placeholder="Release date (e.g. 6/19/26 or TBD)" value={uDate} onChange={e=>setUDate(e.target.value)}/>
        <input className="minput" style={{marginBottom:0}} placeholder="Notes (e.g. S2, cast)" value={note} onChange={e=>setNote(e.target.value)}/>
        <div className="mactions">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-gold" onClick={handleAdd}>
            {sel?`Add "${sel.title.slice(0,28)}${sel.title.length>28?'…':''}"` :'Add'}
          </button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const[items,setItems]=useState(()=>{
    try{
      const s=localStorage.getItem('watchlist-v2');
      if(s)return JSON.parse(s);
    }catch{}
    return DATA;
  });
  const[tab,setTab]=useState('movie');
  const[q,setQ]=useState('');
  const[showAdd,setShowAdd]=useState(false);
  const[done,setDone]=useState(0);
  const[total,setTotal]=useState(0);
  const[fetching,setFetching]=useState(false);

  useEffect(()=>{
    try{localStorage.setItem('watchlist-v2',JSON.stringify(items));}catch{}
  },[items]);

  // Auto-fetch TMDB on first load for items without data
  useEffect(()=>{
    const need=items.filter(i=>!i.tmdbFetched);
    if(!need.length)return;
    setFetching(true);setTotal(need.length);setDone(0);
    const tasks=need.map(item=>async()=>{
      const rs=await tmdbSearch(item.title,item.type);
      const r=rs[0]||null;
      setItems(prev=>{
        const idx=prev.findIndex(x=>x.id===item.id);
        if(idx===-1)return prev;
        const next=[...prev];
        next[idx]={...next[idx],tmdbFetched:true,...(r?{poster:r.poster,description:r.description,tmdbDate:r.date,tmdbId:r.tmdbId}:{})};
        return next;
      });
      setDone(n=>n+1);
    });
    runQ(tasks,5).finally(()=>setFetching(false));
  },[]);// eslint-disable-line

  const del=useCallback(id=>setItems(p=>p.filter(i=>i.id!==id)),[]);
  const add=useCallback(item=>setItems(p=>[...p,item]),[]);

  const exportJSON=()=>{
    const b=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');a.href=u;a.download='watchlist.json';a.click();
    URL.revokeObjectURL(u);
  };

  const tabItems=useMemo(()=>items.filter(i=>i.type===tab),[items,tab]);
  const filtered=useMemo(()=>q?tabItems.filter(i=>i.title.toLowerCase().includes(q.toLowerCase())):tabItems,[tabItems,q]);
  const secs=useMemo(()=>({
    released:filtered.filter(i=>i.category==='released'),
    comingSoon:filtered.filter(i=>i.category==='comingSoon'),
    rewatch:filtered.filter(i=>i.category==='rewatch'),
  }),[filtered]);

  const mCount=items.filter(i=>i.type==='movie').length;
  const tvCount=items.filter(i=>i.type==='tv').length;
  const pct=total>0?(done/total)*100:100;

  return(
    <>
      <div className="hdr">
        <div className="hdr-top">
          <div className="hdr-title">
            🎬 Watchlist
            <small>{items.length} titles{fetching?` · Fetching ${done}/${total}…`:''}</small>
          </div>
          <input className="search" placeholder="Search…" value={q} onChange={e=>setQ(e.target.value)}/>
          <div className="hdr-btns">
            <button className="btn" onClick={exportJSON} title="Export JSON">⬇ JSON</button>
            <button className="btn btn-gold" onClick={()=>setShowAdd(true)}>＋ Add</button>
          </div>
        </div>
        {fetching&&(
          <div className="prog-wrap">
            <div className="prog-label">Loading posters… {done}/{total}</div>
            <div className="prog-track"><div className="prog-fill" style={{width:`${pct}%`}}/></div>
          </div>
        )}
        <div className="tabs">
          <button className={`tab${tab==='movie'?' on':''}`} onClick={()=>setTab('movie')}>Movies ({mCount})</button>
          <button className={`tab${tab==='tv'?' on':''}`} onClick={()=>setTab('tv')}>TV Shows ({tvCount})</button>
        </div>
      </div>

      <div className="main">
        {q&&!filtered.length&&<div className="empty">No results for "{q}"</div>}
        <Section label="Released" items={secs.released} onDelete={del} open={true}/>
        <Section label="Coming Soon" items={secs.comingSoon} onDelete={del} open={true}/>
        <Section label="Rewatch" items={secs.rewatch} onDelete={del} open={false}/>
      </div>

      {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={add}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
